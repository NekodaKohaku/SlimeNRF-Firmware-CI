name: Build SlimeNRF Tracker (I2C)

on:
  workflow_dispatch:
    inputs:
      magnetometer:
        description: "Magnetometer"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled
      sleep:
        description: "Sleep (IMU wake + active timeout)"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      sensor_clock:
        description: "External Sensor Clock (clk-gpios)"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled
      extra_actions:
        description: "User Extra Actions"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      sw0_button:
        description: "SW0 Button"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      pinmap_json:
        description: 'Pins JSON, e.g. {"i2c":{"sda":"P0.06","scl":"P0.08"},"pwm0":"P0.15","sw0":"P1.00","led":"P0.15","clk":"P0.20","spi3":false}'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BOARD_PREFIX: "promicro_uf2/nrf52840/"
      FILENAME_PREFIX: "SlimeNRF_Tracker_"
      FILEFORMAT: "uf2"

    steps:
      - name: Acquire code (root)
        uses: actions/checkout@v5

      - name: Put commit hash/name in env variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Clean Landing Site
        run: sudo rm -rf zephyr-workspace/SlimeNRF-CI

      - name: Acquire code (manifest at zephyr-workspace/SlimeNRF-CI)
        uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel python3-venv xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: Initialize Zephyr Workspace
        run: |
          cd zephyr-workspace
          rm -rf .west
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: |
          cd zephyr-workspace
          source ~/.venv/bin/activate
          pip3 install -r zephyr/scripts/requirements.txt
          python -c "import elftools.elf.elffile, yaml; print('Zephyr Python deps OK')"

      - name: Preparing Build Environment
        run: |
          cd zephyr-workspace
          rm -rf Releases
          mkdir Releases

      - name: Derive names (I2C only)
        run: |
          echo "BOARD=${BOARD_PREFIX}i2c" >> $GITHUB_ENV
          echo "OUTPUT_NAME=${FILENAME_PREFIX}I2C_ProMicro" >> $GITHUB_ENV

      - name: Sanity check workspace
        run: |
          ls -la zephyr-workspace
          test -d "zephyr-workspace/SlimeVR-Tracker-nRF" || (echo "SlimeVR-Tracker-nRF missing"; exit 1)

      # ===== Optional: generate devicetree overlay from pin JSON =====
      - name: Generate devicetree overlay from pin JSON (optional)
        shell: bash
        env:
          PINMAP_JSON: ${{ inputs.pinmap_json }}
        run: |
          set -euo pipefail
          cd zephyr-workspace
          if [[ -z "${PINMAP_JSON:-}" ]]; then
            echo "No PIN JSON provided; skip overlay."
            exit 0
          fi

          python3 - <<'PY'
import os, json, re, sys
pinmap = os.environ.get("PINMAP_JSON","").strip()
try:
    data = json.loads(pinmap)
except Exception as e:
    print("Invalid pinmap_json:", e); sys.exit(1)

def parse_pin(s):
    m = re.fullmatch(r'P?([01])\.(\d{1,2})', s) or re.fullmatch(r'(\d{1,2})', s)
    if not m: raise ValueError(f"bad pin '{s}'")
    if len(m.groups()) == 2:
        port, pin = int(m.group(1)), int(m.group(2))
    else:
        port, pin = 0, int(m.group(1))
    if port not in (0,1): raise ValueError("port must be 0 or 1")
    if port == 1 and not (0 <= pin <= 15): raise ValueError("P1 pin 0..15")
    if port == 0 and not (0 <= pin <= 31): raise ValueError("P0 pin 0..31")
    return port, pin

out = []

def emit_i2c(d):
    sda, scl = d.get("sda"), d.get("scl")
    if not (sda and scl): return
    sp, sn = parse_pin(sda); tp, tn = parse_pin(scl)
    out.append(f"&i2c0_default {{ group1 {{ psels = <NRF_PSEL(TWIM_SDA, {sp}, {sn})>, <NRF_PSEL(TWIM_SCL, {tp}, {tn})>; }}; }};")
    out.append(f"&i2c0_sleep   {{ group1 {{ psels = <NRF_PSEL(TWIM_SDA, {sp}, {sn})>, <NRF_PSEL(TWIM_SCL, {tp}, {tn})>; }}; }};")

def emit_pwm(label, pin):
    p,n = parse_pin(pin)
    out.append(f"&{label}_default {{ group1 {{ psels = <NRF_PSEL(PWM_OUT0, {p}, {n})>; }}; }};")
    out.append(f"&{label}_sleep   {{ group1 {{ psels = <NRF_PSEL(PWM_OUT0, {p}, {n})>; }}; }};")

def emit_spi3(d):
    if d is False:
        out.append('&spi3 { status = "disabled"; };'); return
    miso, mosi, sck, cs = d.get("miso"), d.get("mosi"), d.get("sck"), d.get("cs")
    if miso and mosi and sck:
        mp,mn = parse_pin(miso); op,on = parse_pin(mosi); kp,kn = parse_pin(sck)
        out.append(f"&spi3_default {{ group1 {{ psels = <NRF_PSEL(SPIM_MISO, {mp}, {mn})>, <NRF_PSEL(SPIM_MOSI, {op}, {on})>, <NRF_PSEL(SPIM_SCK, {kp}, {kn})>; }}; }};")
        out.append(f"&spi3_sleep   {{ group1 {{ psels = <NRF_PSEL(SPIM_MISO, {mp}, {mn})>, <NRF_PSEL(SPIM_MOSI, {op}, {on})>, <NRF_PSEL(SPIM_SCK, {kp}, {kn})>; }}; }};")
    if cs:
        cp,cn = parse_pin(cs); out.append(f"&spi3 {{ cs-gpios = <&gpio{cp} {cn} GPIO_ACTIVE_LOW>; }};")

def emit_sw0(pin):
    p,n = parse_pin(pin)
    out.append(f"&button0 {{ gpios = <&gpio{p} {n} (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>; }};")

def emit_led(pin):
    p,n = parse_pin(pin)
    # 用路徑寫法避免 f-string 大括號混淆：直接重開 / 節點合併
    out.append(f"/ {{ zephyr,usershadow: zephyr,user {{ led-gpios = <&gpio{p} {n} GPIO_OPEN_SOURCE>; }}; }};")

def emit_clk(pin):
    p,n = parse_pin(pin)
    out.append(f"/ {{ zephyr,usershadow: zephyr,user {{ clk-gpios = <&gpio{p} {n} GPIO_OPEN_DRAIN>; }}; }};")

if "i2c"  in data: emit_i2c(data["i2c"])
if "pwm0" in data: emit_pwm("pwm0", data["pwm0"])
if "pwm1" in data: emit_pwm("pwm1", data["pwm1"])
if "spi3" in data: emit_spi3(data["spi3"])
if "sw0"  in data: emit_sw0(data["sw0"])
if "led"  in data: emit_led(data["led"])
if "clk"  in data: emit_clk(data["clk"])

if not out:
    print("No overlay content derived; skip."); sys.exit(0)

overlay = "SlimeVR-Tracker-nRF/promicro_pins.overlay"
with open(overlay, "w") as f:
    f.write("/* Auto-generated from pinmap_json */\n" + "\n".join(out) + "\n")
print("Wrote overlay:", overlay)
PY

          if [ -f zephyr-workspace/SlimeVR-Tracker-nRF/promicro_pins.overlay ]; then
            echo "DTC_OVERLAY_FILE=$(pwd)/zephyr-workspace/SlimeVR-Tracker-nRF/promicro_pins.overlay" >> $GITHUB_ENV
          fi

      # ===== 功能開關：外接時鐘 =====
      - name: Enable External Sensor Clock
        if: ${{ inputs.sensor_clock == 'enabled' }}
        run: |
          cd zephyr-workspace
          find="\/\/\sclk-gpios"
          replace="clk-gpios"
          sed -i "s/$find/$replace/g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
          printf "\nCONFIG_USE_SENSOR_CLOCK=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable External Sensor Clock
        if: ${{ inputs.sensor_clock == 'disabled' }}
        run: |
          cd zephyr-workspace
          find='clk-gpios[ \t]='
          replace='// clk-gpios ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts
          printf "\nCONFIG_USE_SENSOR_CLOCK=n" >> SlimeVR-Tracker-nRF/prj.conf

      # ===== 功能開關：Extra Actions =====
      - name: Enable Extra Actions
        if: ${{ inputs.extra_actions == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USER_EXTRA_ACTIONS=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Extra Actions
        if: ${{ inputs.extra_actions == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USER_EXTRA_ACTIONS=n" >> SlimeVR-Tracker-nRF/prj.conf

      # ===== 功能開關：磁力計 =====
      - name: Enable Magnetometer
        if: ${{ inputs.magnetometer == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_SENSOR_USE_MAG=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Magnetometer
        if: ${{ inputs.magnetometer == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_SENSOR_USE_MAG=n" >> SlimeVR-Tracker-nRF/prj.conf

      # ===== 功能開關：睡眠 =====
      - name: Enable Sleep
        if: ${{ inputs.sleep == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_IMU_WAKE_UP=y" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_USE_ACTIVE_TIMEOUT=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Sleep
        if: ${{ inputs.sleep == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_IMU_WAKE_UP=n" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_USE_ACTIVE_TIMEOUT=n" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_SENSOR_LP_TIMEOUT=300000" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_SENSOR_USE_LOW_POWER_2=n" >> SlimeVR-Tracker-nRF/prj.conf

      # ===== 功能開關：SW0 按鍵 =====
      - name: Enable SW0 Button
        if: ${{ inputs.sw0_button == 'enabled' }}
        run: |
          cd zephyr-workspace
          find='\/\/\ssw0\s='
          replace='sw0 ='
          sed -i "s/$find/$replace/g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts

      - name: Disable SW0 Button
        if: ${{ inputs.sw0_button == 'disabled' }}
        run: |
          cd zephyr-workspace
          find='sw0[ \t]='
          replace='// sw0 ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts

      # ===== 正式建置 =====
      - name: Build SlimeVR-Tracker-nRF (tracker only)
        run: |
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          EXTRA_OPTS=""
          if [ -n "${DTC_OVERLAY_FILE:-}" ]; then
            EXTRA_OPTS="-DDTC_OVERLAY_FILE=$DTC_OVERLAY_FILE"
          fi

          west build \
            --board "$BOARD" \
            --pristine=always SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../SlimeVR-Tracker-nRF \
            $EXTRA_OPTS

          SRC1="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.${FILEFORMAT}"
          SRC2="SlimeVR-Tracker-nRF/build/zephyr/zephyr.${FILEFORMAT}"
          if   [ -f "$SRC1" ]; then SRC="$SRC1";
          elif [ -f "$SRC2" ]; then SRC="$SRC2";
          else
            SRC=$(find SlimeVR-Tracker-nRF/build -path "*/zephyr/zephyr.${FILEFORMAT}" | head -n1)
          fi
          test -n "$SRC" -a -f "$SRC" || { echo "UF2 not found"; find SlimeVR-Tracker-nRF/build -maxdepth 4 -type f | sed 's/^/  /'; exit 1; }

          mv "$SRC" "Releases/$OUTPUT_NAME.${FILEFORMAT}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          path: zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}

      - name: Create/Update Github Release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest"
          prerelease: false
          name: "Latest Firmware"
          body: |
            Manual build of the SlimeNRF Tracker Firmware.
            Board: ${{ env.BOARD }} (Conn: I2C)
            Features:
              MAG=${{ inputs.magnetometer }}, SLEEP=${{ inputs.sleep }},
              CLOCK=${{ inputs.sensor_clock }}, EXTRA=${{ inputs.extra_actions }},
              SW0=${{ inputs.sw0_button }}
          files: |
            zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          clear_attachments: true
