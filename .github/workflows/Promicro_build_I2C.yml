name: Build SlimeNRF Tracker (I2C)

on:
  workflow_dispatch:
    inputs:
      magnetometer:
        description: "Magnetometer"
        required: true
        type: choice
        options:
          - enabled
          - disabled
        default: enabled
      sleep:
        description: "Sleep (IMU wake + active timeout)"
        required: true
        type: choice
        options:
          - enabled
          - disabled
        default: disabled
      sensor_clock:
        description: "External Sensor Clock"
        required: true
        type: choice
        options:
          - enabled
          - disabled
        default: enabled
      extra_actions:
        description: "User Extra Actions"
        required: true
        type: choice
        options:
          - enabled
          - disabled
        default: disabled
      sw0_button:
        description: "SW0 Button"
        required: true
        type: choice
        options:
          - enabled
          - disabled
        default: disabled
      i2c_pins:
        description: "I2C pins JSON (sda,scl). ex: {\"sda\":\"P0.6\",\"scl\":\"P0.8\"}"
        required: false
        type: string
        default: ""
      misc_pins:
        description: "Misc pins JSON (clk,int,sw0). ex: {\"clk\":\"P0.20\",\"int\":\"P0.17\",\"sw0\":\"P1.0\"}"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BOARD: "promicro_uf2/nrf52840/i2c"
      OUTPUT_NAME: "SlimeNRF_Tracker_I2C_ProMicro"
      FILEFORMAT: "uf2"

    steps:
      - name: Acquire code (root)
        uses: actions/checkout@v5

      - name: Put commit hash/name in env variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Clean Landing Site
        run: sudo rm -rf zephyr-workspace/SlimeNRF-CI

      - name: Acquire code (manifest at zephyr-workspace/SlimeNRF-CI)
        uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel python3-venv xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: Initialize Zephyr Workspace
        run: |
          cd zephyr-workspace
          rm -rf .west
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: |
          cd zephyr-workspace
          source ~/.venv/bin/activate
          pip3 install -r zephyr/scripts/requirements.txt
          python -c "import elftools.elf.elffile, yaml; print('Zephyr Python deps OK')"

      - name: Preparing Build Environment
        run: |
          cd zephyr-workspace
          rm -rf Releases
          mkdir Releases

      - name: Sanity check workspace
        run: |
          ls -la zephyr-workspace
          test -d "zephyr-workspace/SlimeVR-Tracker-nRF" || (echo "SlimeVR-Tracker-nRF missing"; exit 1)

      - name: Parse pin JSON to env (I2C)
        run: |
          python - <<'PY'
          import os, json
          def load(name):
              s = os.getenv(name, "")
              return json.loads(s) if s.strip() else {}
          i2c  = load("I2C_PINS")
          misc = load("MISC_PINS")
          lines = [
              f"I2C_SDA_PIN={i2c.get('sda','')}",
              f"I2C_SCL_PIN={i2c.get('scl','')}",
              f"CLK_PIN={misc.get('clk','')}",
              f"IMU_INT_PIN={misc.get('int','')}",
              f"SW0_PIN={misc.get('sw0','')}",
          ]
          with open(os.getenv("GITHUB_ENV"), "a") as f:
              f.write("\n".join(lines) + "\n")
          PY
        env:
          I2C_PINS: ${{ inputs.i2c_pins }}
          MISC_PINS: ${{ inputs.misc_pins }}

      - name: Generate custom pin overlay (I2C)
        run: |
          set -eo pipefail
          cd zephyr-workspace/SlimeVR-Tracker-nRF

          # pick the right pinctrl header across Zephyr versions
          INC="zephyr/dt-bindings/pinctrl/nrf-pinctrl.h"
          if [ ! -f "../zephyr/include/${INC}" ]; then
            INC="zephyr/dt-bindings/pinctrl/nordic-nrf-pinctrl.h"
          fi

          parse_pin() {
            local raw="$1"
            if [ -z "$raw" ]; then echo ""; return; fi
            if [[ "$raw" =~ ^P([01])\.([0-9]{1,2})$ ]]; then
              PORT="${BASH_REMATCH[1]}"; PIN="${BASH_REMATCH[2]}"
            elif [[ "$raw" =~ ^([0-9]{1,2})$ ]]; then
              local n="${BASH_REMATCH[1]}"
              if [ "$n" -ge 32 ]; then PORT=1; PIN=$((n-32)); else PORT=0; PIN="$n"; fi
            else
              echo "Invalid pin format: '$raw' (use P0.xx / P1.xx / abs int)" >&2
              exit 2
            fi
          }

          SDA="${I2C_SDA_PIN}"; SCL="${I2C_SCL_PIN}"
          INT="${IMU_INT_PIN}"; CLK="${CLK_PIN}"; SW0="${SW0_PIN}"

          OVERLAY="/* Auto-generated by CI: ci_pins.overlay (I2C) */\n"
          OVERLAY+="#include <${INC}>\n"
          OVERLAY+="#include <zephyr/dt-bindings/gpio/gpio.h>\n"

          if [ -n "$SDA" ] || [ -n "$SCL" ]; then
            [ -n "$SDA" ] && parse_pin "$SDA" && SDA_PORT="$PORT" && SDA_PIN="$PIN"
            [ -n "$SCL" ] && parse_pin "$SCL" && SCL_PORT="$PORT" && SCL_PIN="$PIN"

            OVERLAY+="\n&pinctrl {\n"
            OVERLAY+="  i2c0_user_default: i2c0_user_default { group1 { psels = "
            if [ -n "$SDA_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SDA, ${SDA_PORT}, ${SDA_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SDA, 0, 6)>"; fi
            OVERLAY+=", "
            if [ -n "$SCL_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SCL, ${SCL_PORT}, ${SCL_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SCL, 0, 8)>"; fi
            OVERLAY+="; bias-disable; }; };\n"

            OVERLAY+="  i2c0_user_sleep: i2c0_user_sleep { group1 { psels = "
            if [ -n "$SDA_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SDA, ${SDA_PORT}, ${SDA_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SDA, 0, 6)>"; fi
            OVERLAY+=", "
            if [ -n "$SCL_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SCL, ${SCL_PORT}, ${SCL_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SCL, 0, 8)>"; fi
            OVERLAY+="; bias-disable; low-power-enable; }; };\n};\n"

            OVERLAY+="\n&i2c0 { pinctrl-0 = <&i2c0_user_default>; pinctrl-1 = <&i2c0_user_sleep>; };\n"
          fi

          if [ -n "$CLK" ] || [ -n "$INT" ]; then
            OVERLAY+="\n/ { zephyr,user {\n"
            if [ -n "$CLK" ]; then parse_pin "$CLK"; OVERLAY+="  clk-gpios = <&gpio${PORT} ${PIN} GPIO_OPEN_DRAIN>;\n"; fi
            if [ -n "$INT" ]; then parse_pin "$INT"; OVERLAY+="  int0-gpios = <&gpio${PORT} ${PIN} 0>;\n"; fi
            OVERLAY+="}; };\n"
          fi

          if [ -n "$SW0" ]; then
            parse_pin "$SW0"
            OVERLAY+="\n&button0 { gpios = <&gpio${PORT} ${PIN} (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>; };\n"
          fi

          # add retained_mem if board doesn't define it
          if ! grep -R -q "retained_mem:" boards/nordic/promicro_uf2 2>/dev/null; then
            OVERLAY+="\n/ {\n  reserved-memory {\n    #address-cells = <1>;\n    #size-cells = <1>;\n    ranges;\n"
            OVERLAY+="    retained_mem: memory@2003f000 {\n"
            OVERLAY+="      compatible = \"zephyr,memory-region\";\n"
            OVERLAY+="      reg = <0x2003f000 0x1000>;\n"
            OVERLAY+="      zephyr,memory-region = \"RAM\";\n"
            OVERLAY+="    };\n  };\n};\n"
          fi

          printf "%b" "$OVERLAY" > ci_pins.overlay
          echo "===== ci_pins.overlay ====="
          cat ci_pins.overlay || true
          echo "==========================="

      - name: Apply feature toggles
        run: |
          cd zephyr-workspace
          {
            echo ""
            echo "CONFIG_USER_EXTRA_ACTIONS=${{ inputs.extra_actions == 'enabled' && 'y' || 'n' }}"
            echo "CONFIG_SENSOR_USE_MAG=${{ inputs.magnetometer == 'enabled' && 'y' || 'n' }}"
            echo "CONFIG_USE_IMU_WAKE_UP=${{ inputs.sleep == 'enabled' && 'y' || 'n' }}"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=${{ inputs.sleep == 'enabled' && 'y' || 'n' }}"
            echo "CONFIG_USE_SENSOR_CLOCK=${{ inputs.sensor_clock == 'enabled' && 'y' || 'n' }}"
            if [ "${{ inputs.sleep }}" = "disabled" ]; then
              echo "CONFIG_SENSOR_LP_TIMEOUT=300000"
              echo "CONFIG_SENSOR_USE_LOW_POWER_2=n"
            fi
          } >> SlimeVR-Tracker-nRF/prj.conf

      - name: Build SlimeVR-Tracker-nRF (I2C)
        run: |
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          EXTRA_OPT=""
          if [ -s "SlimeVR-Tracker-nRF/ci_pins.overlay" ]; then
            EXTRA_OPT="-DDTC_OVERLAY_FILE=$(pwd)/SlimeVR-Tracker-nRF/ci_pins.overlay"
          fi

          west build \
            --board "$BOARD" \
            --pristine=always SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../SlimeVR-Tracker-nRF \
            ${EXTRA_OPT}

          SRC1="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.${FILEFORMAT}"
          SRC2="SlimeVR-Tracker-nRF/build/zephyr/zephyr.${FILEFORMAT}"
          if   [ -f "$SRC1" ]; then SRC="$SRC1";
          elif [ -f "$SRC2" ]; then SRC="$SRC2";
          else
            SRC=$(find SlimeVR-Tracker-nRF/build -path "*/zephyr/zephyr.${FILEFORMAT}" | head -n1)
          fi
          test -n "$SRC" -a -f "$SRC" || { echo "UF2 not found"; find SlimeVR-Tracker-nRF/build -maxdepth 5 -type f | sed 's/^/  /'; exit 1; }

          mv "$SRC" "Releases/$OUTPUT_NAME.${FILEFORMAT}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          path: zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}

      - name: Create/Update Github Release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest"
          prerelease: false
          name: "Latest Firmware"
          body: |
            Manual build (I2C).
            Features:
              MAG=${{ inputs.magnetometer }}, SLEEP=${{ inputs.sleep }},
              CLOCK=${{ inputs.sensor_clock }}, EXTRA=${{ inputs.extra_actions }},
              SW0=${{ inputs.sw0_button }}
            Pins JSON:
              i2c=${{ inputs.i2c_pins }}
              misc=${{ inputs.misc_pins }}
          files: |
            zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          clear_attachments: true
