name: Build SlimeNRF Tracker (SPI)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BOARD_PREFIX: "promicro_uf2/nrf52840/"
      FILENAME_PREFIX: "SlimeNRF_Tracker_"
      FILEFORMAT: "uf2"

      # --- ピン設定---
      MISO: "P0.24"
      MOSI: "P0.06"
      SCK:  "P0.08"
      CS:   "P0.22"
      PWM0: "P0.15"
      SW0:  "P1.00"
      LED:  "P0.15"
      CLK:  "P0.20"
      INT:  "P0.17"
      VCC:  "P0.31"

      # --- 機能スイッチ---
      MAGNETOMETER: "enabled"
      SLEEP:        "disabled"
      SENSOR_CLOCK: "enabled"
      EXTRA_ACTIONS: "disabled"
      SW0_BUTTON:   "disabled"

    steps:
      - name: Acquire code (root)
        uses: actions/checkout@v5

      - name: Put commit hash/name in env variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Clean Landing Site
        run: sudo rm -rf zephyr-workspace/SlimeNRF-CI

      - name: Acquire code (manifest at zephyr-workspace/SlimeNRF-CI)
        uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel python3-venv xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: Initialize Zephyr Workspace
        run: |
          cd zephyr-workspace
          rm -rf .west
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: |
          cd zephyr-workspace
          source ~/.venv/bin/activate
          pip3 install -r zephyr/scripts/requirements.txt
          python -c "import elftools.elf.elffile, yaml; print('Zephyr Python deps OK')"

      - name: Preparing Build Environment
        run: |
          cd zephyr-workspace
          rm -rf Releases
          mkdir Releases

      - name: Derive names (SPI)
        run: |
          echo "BOARD=${BOARD_PREFIX}spi" >> $GITHUB_ENV
          echo "OUTPUT_NAME=${FILENAME_PREFIX}SPI_ProMicro" >> $GITHUB_ENV
          echo "CONFIG_BUILD_OUTPUT_UF2=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Generate DTS overlay from env (SPI)
        shell: bash
        run: |
          set -euo pipefail
          cd zephyr-workspace

          parse_pin() {
            local s="$1" port pin
            if [[ $s =~ ^P?([01])\.([0-9]{1,2})$ ]]; then
              port="${BASH_REMATCH[1]}"; pin="${BASH_REMATCH[2]}"
            elif [[ $s =~ ^([0-9]{1,2})$ ]]; then
              port="0"; pin="${BASH_REMATCH[1]}"
            else
              echo "Invalid pin: $s" >&2; exit 1
            fi
            pin=$((10#$pin))
            [[ $port -eq 0 || $pin -le 15 ]] || { echo "P1.* は 0..15 のみ: P${port}.${pin}" >&2; exit 1; }
            echo "$port $pin"
          }

          read MISO_P MISO_N < <(parse_pin "${MISO}")
          read MOSI_P MOSI_N < <(parse_pin "${MOSI}")
          read  SCK_P  SCK_N < <(parse_pin "${SCK}")
          read   CS_P   CS_N < <(parse_pin "${CS}")
          read PWM0_P PWM0_N < <(parse_pin "${PWM0}")
          read  SW0_P  SW0_N < <(parse_pin "${SW0}")
          read  LED_P  LED_N < <(parse_pin "${LED}")
          read  CLK_P  CLK_N < <(parse_pin "${CLK}")
          read  INT_P  INT_N < <(parse_pin "${INT}")
          read  VCC_P  VCC_N < <(parse_pin "${VCC}")

          OVERLAY="SlimeVR-Tracker-nRF/promicro_pins.overlay"
          {
            echo "/* Auto-generated from workflow env (SPI) */"
            echo "&pinctrl {"
            echo "  spi3_default: spi3_default { group1 {"
            echo "    psels = <NRF_PSEL(SPIM_MISO, ${MISO_P}, ${MISO_N})>,"
            echo "            <NRF_PSEL(SPIM_MOSI, ${MOSI_P}, ${MOSI_N})>,"
            echo "            <NRF_PSEL(SPIM_SCK,  ${SCK_P},  ${SCK_N})>;"
            echo "  }; };"
            echo "  spi3_sleep: spi3_sleep { group1 {"
            echo "    psels = <NRF_PSEL(SPIM_MISO, ${MISO_P}, ${MISO_N})>,"
            echo "            <NRF_PSEL(SPIM_MOSI, ${MOSI_P}, ${MOSI_N})>,"
            echo "            <NRF_PSEL(SPIM_SCK,  ${SCK_P},  ${SCK_N})>;"
            echo "  }; };"
            echo "};"
            echo ""
            echo "&spi3 { cs-gpios = <&gpio${CS_P} ${CS_N} GPIO_ACTIVE_LOW>; };"
            echo "&pwm0_default { group1 { psels = <NRF_PSEL(PWM_OUT0, ${PWM0_P}, ${PWM0_N})>; }; };"
            echo "&pwm0_sleep   { group1 { psels = <NRF_PSEL(PWM_OUT0, ${PWM0_P}, ${PWM0_N})>; }; };"
            if [[ "${SW0_BUTTON}" == "enabled" ]]; then
              echo "&button0 { gpios = <&gpio${SW0_P} ${SW0_N} (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>; };"
            fi
            echo "/ { zephyr,user {"
            echo "  led-gpios = <&gpio${LED_P} ${LED_N} GPIO_OPEN_SOURCE>;"
            if [[ "${SENSOR_CLOCK}" == "enabled" ]]; then
              echo "  clk-gpios = <&gpio${CLK_P} ${CLK_N} GPIO_OPEN_DRAIN>;"
            fi
            echo "  int0-gpios = <&gpio${INT_P} ${INT_N} GPIO_ACTIVE_HIGH>;"
            echo "  vcc-gpios  = <&gpio${VCC_P} ${VCC_N} GPIO_ACTIVE_HIGH>;"
            echo "}; };"
          } > "$OVERLAY"

          echo "DTC_OVERLAY_FILE=$(pwd)/$OVERLAY" >> $GITHUB_ENV
          echo "Wrote overlay: $OVERLAY"
          sed -n '1,120p' "$OVERLAY"

      - name: Feature toggles
        run: |
          cd zephyr-workspace
          [[ "${EXTRA_ACTIONS}" == "enabled" ]] && echo "CONFIG_USER_EXTRA_ACTIONS=y" >> SlimeVR-Tracker-nRF/prj.conf || echo "CONFIG_USER_EXTRA_ACTIONS=n" >> SlimeVR-Tracker-nRF/prj.conf
          [[ "${MAGNETOMETER}"  == "enabled" ]] && echo "CONFIG_SENSOR_USE_MAG=y" >> SlimeVR-Tracker-nRF/prj.conf || echo "CONFIG_SENSOR_USE_MAG=n" >> SlimeVR-Tracker-nRF/prj.conf
          if [[ "${SLEEP}" == "enabled" ]]; then
            echo "CONFIG_USE_IMU_WAKE_UP=y" >> SlimeVR-Tracker-nRF/prj.conf
            echo "CONFIG_USE_ACTIVE_TIMEOUT=y" >> SlimeVR-Tracker-nRF/prj.conf
          else
            echo "CONFIG_USE_IMU_WAKE_UP=n" >> SlimeVR-Tracker-nRF/prj.conf
            echo "CONFIG_USE_ACTIVE_TIMEOUT=n" >> SlimeVR-Tracker-nRF/prj.conf
            echo "CONFIG_SENSOR_LP_TIMEOUT=300000" >> SlimeVR-Tracker-nRF/prj.conf
            echo "CONFIG_SENSOR_USE_LOW_POWER_2=n" >> SlimeVR-Tracker-nRF/prj.conf
          fi
          [[ "${SENSOR_CLOCK}" == "enabled" ]] && echo "CONFIG_USE_SENSOR_CLOCK=y" >> SlimeVR-Tracker-nRF/prj.conf || echo "CONFIG_USE_SENSOR_CLOCK=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Build SlimeVR-Tracker-nRF (tracker only)
        run: |
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          EXTRA_OPTS=""
          if [[ -n "${DTC_OVERLAY_FILE:-}" && -f "${DTC_OVERLAY_FILE}" ]]; then
            EXTRA_OPTS="-DDTC_OVERLAY_FILE=${DTC_OVERLAY_FILE}"
          fi

          west build \
            --board "$BOARD" \
            --pristine=always SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../SlimeVR-Tracker-nRF \
            ${EXTRA_OPTS}

          SRC1="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.${FILEFORMAT}"
          SRC2="SlimeVR-Tracker-nRF/build/zephyr/zephyr.${FILEFORMAT}"
          if   [ -f "$SRC1" ]; then SRC="$SRC1";
          elif [ -f "$SRC2" ]; then SRC="$SRC2";
          else
            SRC=$(find SlimeVR-Tracker-nRF/build -type f -name "*.uf2" | head -n1)
          fi
          test -n "$SRC" -a -f "$SRC" || { echo "UF2 not found"; find SlimeVR-Tracker-nRF/build -maxdepth 6 -type f -printf "  %p\n"; exit 1; }

          mv "$SRC" "Releases/$OUTPUT_NAME.${FILEFORMAT}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          path: zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}

      - name: Create/Update Github Release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest"
          prerelease: false
          name: "Latest Firmware"
          body: |
            Manual build of the SlimeNRF Tracker Firmware.
            Board: ${{ env.BOARD }}
            Features:
              MAG=${{ env.MAGNETOMETER }}, SLEEP=${{ env.SLEEP }},
              CLOCK=${{ env.SENSOR_CLOCK }}, EXTRA=${{ env.EXTRA_ACTIONS }},
              SW0=${{ env.SW0_BUTTON }}
            Pins (SPI):
              MISO=${{ env.MISO }}, MOSI=${{ env.MOSI }}, SCK=${{ env.SCK }}, CS=${{ env.CS }}
              PWM0=${{ env.PWM0 }}, SW0=${{ env.SW0 }}
              LED=${{ env.LED }}, CLK=${{ env.CLK }}
              INT=${{ env.INT }}, VCC=${{ env.VCC }}
          files: |
            zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          clear_attachments: true
