name: Build ProMicro I2C (manual, 4 toggles)

on:
  workflow_dispatch:
    inputs:
      clk:
        description: "外部時鐘"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled
      sleep:
        description: "睡眠模式"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      sw0:
        description: "SW0 按鍵"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      magnetometer:
        description: "磁力計"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 💻 Checkout CI repo into workspace
        uses: actions/checkout@v4
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: 🧰 Install host deps + west
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf dfu-util device-tree-compiler \
            python3-pip python3-setuptools python3-wheel wget xz-utils file
          pip3 install --upgrade west

      - name: 🪁 Install Zephyr SDK 0.17.2 (arm-zephyr-eabi)
        run: |
          set -euxo pipefail
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Init Zephyr workspace
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export
          pip3 install -r zephyr/scripts/requirements.txt

      - name: 📥 Ensure SlimeVR-Tracker-nRF exists
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          if [ ! -d SlimeVR-Tracker-nRF ]; then
            git clone --depth 1 https://github.com/SlimeVR/SlimeVR-Tracker-nRF.git SlimeVR-Tracker-nRF
          fi
          test -f SlimeVR-Tracker-nRF/CMakeLists.txt

      - name: 🧽 Prepare output dir
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          rm -rf Releases
          mkdir -p Releases

      # === Toggles: clk ===
      - name: 🔧 Disable external clock (clk-gpios) + Kconfig
        if: ${{ inputs.clk == 'disabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          find='clk-gpios[ \t]*='
          replace='// clk-gpios ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts || true
          printf "\nCONFIG_USE_SENSOR_CLOCK=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: 🔧 Enable external clock (uncomment) + Kconfig
        if: ${{ inputs.clk == 'enabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          find='\/\/[ \t]*clk-gpios[ \t]*='
          replace='clk-gpios ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts || true
          printf "\nCONFIG_USE_SENSOR_CLOCK=y" >> SlimeVR-Tracker-nRF/prj.conf

      # === Toggles: SW0 ===
      - name: 🔧 Disable SW0 in DTS + Kconfig
        if: ${{ inputs.sw0 == 'disabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          find='sw0[ \t]*='
          replace='// sw0 ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts || true
          printf "\nCONFIG_USER_SW0=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: 🔧 Enable SW0 in DTS + Kconfig
        if: ${{ inputs.sw0 == 'enabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          find='\/\/[ \t]*sw0[ \t]*='
          replace='sw0 ='
          sed -i "s|$find|$replace|g" SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts || true
          printf "\nCONFIG_USER_SW0=y" >> SlimeVR-Tracker-nRF/prj.conf

      # === Toggles: Sleep ===
      - name: 🔧 Sleep = enabled
        if: ${{ inputs.sleep == 'enabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          {
            echo "CONFIG_USE_IMU_WAKE_UP=y"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=y"
          } >> SlimeVR-Tracker-nRF/prj.conf

      - name: 🔧 Sleep = disabled
        if: ${{ inputs.sleep == 'disabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          {
            echo "CONFIG_USE_IMU_WAKE_UP=n"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=n"
            echo "CONFIG_SENSOR_LP_TIMEOUT=300000"
            echo "CONFIG_SENSOR_USE_LOW_POWER_2=n"
          } >> SlimeVR-Tracker-nRF/prj.conf

      # === Toggles: Magnetometer ===
      - name: 🔧 Magnetometer = enabled
        if: ${{ inputs.magnetometer == 'enabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          echo "CONFIG_SENSOR_USE_MAG=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: 🔧 Magnetometer = disabled
        if: ${{ inputs.magnetometer == 'disabled' }}
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          echo "CONFIG_SENSOR_USE_MAG=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: 🔨 Build SlimeVR-Tracker-nRF (ProMicro I2C)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          APP_DIR="$(pwd)/SlimeVR-Tracker-nRF"
          BUILD_DIR="$APP_DIR/build"
          OUT_DIR="$(pwd)/Releases"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR" "$OUT_DIR"

          west build \
            --board promicro_uf2/nrf52840/i2c \
            --pristine=always "$APP_DIR" \
            --build-dir "$BUILD_DIR" \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT="$APP_DIR"

          cp "$BUILD_DIR/SlimeVR-Tracker-nRF/zephyr/zephyr.uf2" \
             "$OUT_DIR/SlimeNRF_Tracker_I2C_ProMicro.uf2"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlimeNRF_Tracker_I2C_ProMicro.uf2
          path: zephyr-workspace/Releases/SlimeNRF_Tracker_I2C_ProMicro.uf2

      - name: 🚀 Publish/Update 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Firmware"
          body: |
            Manual single-target build:

            Board: promicro_uf2/nrf52840/i2c
            clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}, extraaction=enabled
            File: SlimeNRF_Tracker_I2C_ProMicro.uf2

            Download asset below.
          files: |
            zephyr-workspace/Releases/SlimeNRF_Tracker_I2C_ProMicro.uf2
