name: Build ProMicro I2C (manual, toggles)

on:
  workflow_dispatch:
    inputs:
      clk:
        description: "外部時鐘 (clk-gpios / CONFIG_USE_SENSOR_CLOCK)"
        type: choice
        options: [enabled, disabled]
        default: disabled
      sleep:
        description: "睡眠模式 (CONFIG_USE_IMU_WAKE_UP / CONFIG_USE_ACTIVE_TIMEOUT)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      sw0:
        description: "SW0 按鍵 (DTS sw0 屬性 + CONFIG_USER_SW0)"
        type: choice
        options: [enabled, disabled]
        default: disabled
      magnetometer:
        description: "磁力計 (CONFIG_SENSOR_USE_MAG)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      extraaction:
        description: "額外動作 (CONFIG_USER_EXTRA_ACTIONS)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      filename:
        description: "輸出檔名（不含副檔名）"
        type: string
        default: "SlimeNRF_Tracker_I2C_ProMicro"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout CI repo into workspace
        uses: actions/checkout@v4
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: 🧰 Install host deps + west
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf dfu-util device-tree-compiler \
            python3-pip python3-setuptools python3-wheel wget xz-utils file
          pip3 install --upgrade west

      - name: 🪁 Install Zephyr SDK 0.17.2 (arm-zephyr-eabi)
        run: |
          set -euxo pipefail
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Init Zephyr workspace from this CI repo (west)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export
          pip3 install -r zephyr/scripts/requirements.txt

      - name: 📥 Ensure SlimeVR-Tracker-nRF exists
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          if [ ! -d SlimeVR-Tracker-nRF ]; then
            git clone --depth 1 https://github.com/SlimeVR/SlimeVR-Tracker-nRF.git SlimeVR-Tracker-nRF
          fi
          test -f SlimeVR-Tracker-nRF/CMakeLists.txt

      - name: 🧽 Prepare output dir
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          rm -rf Releases
          mkdir -p Releases

      # =========================
      # Kconfig 開關（雙向）
      # =========================
      - name: 🔧 Apply Kconfig toggles (dual-way)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          KF="SlimeVR-Tracker-nRF/.ci_kconfig.conf"
          : > "$KF"

          # clk
          if [ "${{ inputs.clk }}" = "enabled" ]; then
            echo "CONFIG_USE_SENSOR_CLOCK=y" >> "$KF"
          else
            echo "CONFIG_USE_SENSOR_CLOCK=n" >> "$KF"
          fi

          # sleep
          if [ "${{ inputs.sleep }}" = "enabled" ]; then
            echo "CONFIG_USE_IMU_WAKE_UP=y"   >> "$KF"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=y" >> "$KF"
          else
            echo "CONFIG_USE_IMU_WAKE_UP=n"     >> "$KF"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=n"  >> "$KF"
            echo "CONFIG_SENSOR_LP_TIMEOUT=300000" >> "$KF"
            echo "CONFIG_SENSOR_USE_LOW_POWER_2=n" >> "$KF"
          fi

          # sw0
          if [ "${{ inputs.sw0 }}" = "enabled" ]; then
            echo "CONFIG_USER_SW0=y" >> "$KF"
          else
            echo "CONFIG_USER_SW0=n" >> "$KF"
          fi

          # magnetometer
          if [ "${{ inputs.magnetometer }}" = "enabled" ]; then
            echo "CONFIG_SENSOR_USE_MAG=y" >> "$KF"
          else
            echo "CONFIG_SENSOR_USE_MAG=n" >> "$KF"
          fi

          # extraaction
          if [ "${{ inputs.extraaction }}" = "enabled" ]; then
            echo "CONFIG_USER_EXTRA_ACTIONS=y" >> "$KF"
          else
            echo "CONFIG_USER_EXTRA_ACTIONS=n" >> "$KF"
          fi

          # append 到 app 的 prj.conf
          cat "$KF" >> SlimeVR-Tracker-nRF/prj.conf
          echo "==== Appended to prj.conf ===="
          cat "$KF"

      # =========================
      # DTS 屬性（雙向：clk-gpios / sw0）
      # =========================
      - name: 🔧 DTS: clk-gpios toggle (dual-way)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          DTS="SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts"
          if [ -f "$DTS" ]; then
            if [ "${{ inputs.clk }}" = "enabled" ]; then
              # 取消註解
              sed -i -E 's|^[[:space:]]*//[[:space:]]*clk-gpios[[:space:]]*=|  clk-gpios =|g' "$DTS" || true
            else
              # 註解（規一化並加上 //）
              sed -i -E 's|^[[:space:]]*//[[:space:]]*clk-gpios[[:space:]]*=|// clk-gpios =|g' "$DTS" || true
              sed -i -E 's|(^[[:space:]]*)clk-gpios[[:space:]]*=|\1// clk-gpios =|g' "$DTS" || true
            fi
          fi

      - name: 🔧 DTS: sw0 property toggle (dual-way)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          DTS="SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts"
          if [ -f "$DTS" ]; then
            if [ "${{ inputs.sw0 }}" = "enabled" ]; then
              # 取消註解
              sed -i -E 's|^[[:space:]]*//[[:space:]]*sw0[[:space:]]*=|  sw0 =|g' "$DTS" || true
            else
              # 註解（規一化並加上 //）
              sed -i -E 's|^[[:space:]]*//[[:space:]]*sw0[[:space:]]*=|// sw0 =|g' "$DTS" || true
              sed -i -E 's|(^[[:space:]]*)sw0[[:space:]]*=|\1// sw0 =|g' "$DTS" || true
            fi
          fi

      # =========================
      # Build（禁用 sysbuild）
      # =========================
      - name: 🔨 Build SlimeVR-Tracker-nRF (ProMicro I2C, no-sysbuild)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          west build \
            --board promicro_uf2/nrf52840/i2c \
            --pristine=always \
            --no-sysbuild \
            SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../SlimeVR-Tracker-nRF \
            -DSYSBUILD=OFF

          OUT="Releases/${{ inputs.filename }}.uf2"
          mv SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.uf2 "$OUT"
          echo "Output: $OUT"

      - name: 🧾 Job Summary
        run: |
          {
            echo "Manual single-target build:"
            echo
            echo "Board: promicro_uf2/nrf52840/i2c"
            echo "clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}, extraaction=${{ inputs.extraaction }}"
            echo "File: ${{ inputs.filename }}.uf2"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.filename }}.uf2
          path: zephyr-workspace/Releases/${{ inputs.filename }}.uf2

      - name: 🚀 Publish/Update 'latest' release (uses GITHUB_TOKEN)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Firmware (ProMicro I2C)"
          body: |
            Manual single-target build:

            Board: promicro_uf2/nrf52840/i2c
            clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}, extraaction=${{ inputs.extraaction }}
            File: ${{ inputs.filename }}.uf2
          files: |
            zephyr-workspace/Releases/${{ inputs.filename }}.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
