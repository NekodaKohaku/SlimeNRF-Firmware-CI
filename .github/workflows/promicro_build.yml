name: Build ProMicro I2C (manual, with toggles)

on:
  workflow_dispatch:
    inputs:
      clk:
        description: "外部時鐘 (clk-gpios / CONFIG_USE_SENSOR_CLOCK)"
        type: choice
        options: [enabled, disabled]
        default: disabled
      sleep:
        description: "睡眠 (CONFIG_USE_IMU_WAKE_UP / CONFIG_USE_ACTIVE_TIMEOUT)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      sw0:
        description: "SW0 按鍵 (只改 DTS 之 sw0 屬性)"
        type: choice
        options: [enabled, disabled]
        default: disabled
      magnetometer:
        description: "磁力計 (CONFIG_SENSOR_USE_MAG)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      extraaction:
        description: "額外動作 (CONFIG_USER_EXTRA_ACTIONS)"
        type: choice
        options: [enabled, disabled]
        default: enabled
      filename:
        description: "輸出檔名（不含副檔名）"
        type: string
        default: "SlimeNRF_Tracker_I2C_ProMicro"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout CI repo into workspace
        uses: actions/checkout@v4
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: 🧰 Install host deps + west
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf dfu-util device-tree-compiler \
            python3-pip python3-setuptools python3-wheel wget xz-utils file
          pip3 install --upgrade west

      - name: 🪁 Install Zephyr SDK 0.17.2 (arm-zephyr-eabi)
        run: |
          set -euxo pipefail
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Init Zephyr workspace from this CI repo (west)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export
          pip3 install -r zephyr/scripts/requirements.txt

      - name: 📥 Ensure SlimeVR-Tracker-nRF exists
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          if [ ! -d SlimeVR-Tracker-nRF ]; then
            git clone --depth 1 https://github.com/SlimeVR/SlimeVR-Tracker-nRF.git SlimeVR-Tracker-nRF
          fi
          test -f SlimeVR-Tracker-nRF/CMakeLists.txt

      - name: 🧽 Prepare output dir
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          rm -rf Releases
          mkdir -p Releases

      - name: "🩹 Patch Kconfig for nRF52840 (disable DPPI if present)"
        run: |
          set -euxo pipefail
          cd zephyr-workspace/SlimeVR-Tracker-nRF
          sed -i -E 's/^[[:space:]]*CONFIG_NRFX_DPPI10=y/# CONFIG_NRFX_DPPI10 is not set/' prj.conf || true
          sed -i -E 's/^[[:space:]]*CONFIG_NRFX_DPPI=y/# CONFIG_NRFX_DPPI is not set/' prj.conf || true

      # ============ Kconfig：clk / sleep / magnetometer / extraaction（雙向） ============
      - name: "🔧 Kconfig: USE_SENSOR_CLOCK"
        if: ${{ inputs.clk == 'enabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_USE_SENSOR_CLOCK=y" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf
      - name: "🔧 Kconfig: !USE_SENSOR_CLOCK"
        if: ${{ inputs.clk == 'disabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_USE_SENSOR_CLOCK=n" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf

      - name: "🔧 Kconfig: Sleep ON"
        if: ${{ inputs.sleep == 'enabled' }}
        run: |
          set -euxo pipefail
          {
            echo "CONFIG_USE_IMU_WAKE_UP=y"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=y"
          } >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf
      - name: "🔧 Kconfig: Sleep OFF"
        if: ${{ inputs.sleep == 'disabled' }}
        run: |
          set -euxo pipefail
          {
            echo "CONFIG_USE_IMU_WAKE_UP=n"
            echo "CONFIG_USE_ACTIVE_TIMEOUT=n"
            echo "CONFIG_SENSOR_LP_TIMEOUT=300000"
            echo "CONFIG_SENSOR_USE_LOW_POWER_2=n"
          } >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf

      - name: "🔧 Kconfig: Magnetometer ON"
        if: ${{ inputs.magnetometer == 'enabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_SENSOR_USE_MAG=y" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf
      - name: "🔧 Kconfig: Magnetometer OFF"
        if: ${{ inputs.magnetometer == 'disabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_SENSOR_USE_MAG=n" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf

      - name: "🔧 Kconfig: Extra action ON"
        if: ${{ inputs.extraaction == 'enabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_USER_EXTRA_ACTIONS=y" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf
      - name: "🔧 Kconfig: Extra action OFF"
        if: ${{ inputs.extraaction == 'disabled' }}
        run: |
          set -euxo pipefail
          echo "CONFIG_USER_EXTRA_ACTIONS=n" >> zephyr-workspace/SlimeVR-Tracker-nRF/prj.conf

      # ============ DTS：clk-gpios / sw0（雙向） ============
      - name: "🔧 DTS: clk-gpios toggle"
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          DTS="SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts"
          if [ -f "$DTS" ]; then
            if [ "${{ inputs.clk }}" = "enabled" ]; then
              # 取消註解 clk-gpios =
              sed -i -E 's|^[[:space:]]*//[[:space:]]*clk-gpios[[:space:]]*=|  clk-gpios =|g' "$DTS" || true
            else
              # 註解 clk-gpios =
              sed -i -E 's|(^[[:space:]]*)clk-gpios[[:space:]]*=|\1// clk-gpios =|g' "$DTS" || true
            fi
          fi

      - name: "🔧 DTS: sw0 toggle"
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          DTS="SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2.dts"
          if [ -f "$DTS" ]; then
            if [ "${{ inputs.sw0 }}" = "enabled" ]; then
              sed -i -E 's|^[[:space:]]*//[[:space:]]*sw0[[:space:]]*=|  sw0 =|g' "$DTS" || true
            else
              sed -i -E 's|(^[[:space:]]*)sw0[[:space:]]*=|\1// sw0 =|g' "$DTS" || true
            fi
          fi

      # ============ Build ============
      - name: 🔨 Build SlimeVR-Tracker-nRF (ProMicro I2C, no-sysbuild)
        run: |
          set -euxo pipefail
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          west build \
            --board promicro_uf2/nrf52840/i2c \
            --pristine=always \
            --no-sysbuild \
            SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=.. # ⭐️ 修正：路徑從 ../SlimeVR-Tracker-nRF 改為 ..

          mv SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.uf2 \
             Releases/${{ inputs.filename }}.uf2

      - name: 🧾 Job Summary
        run: |
          {
            echo "Manual single-target build:"
            echo
            echo "Board: promicro_uf2/nrf52840/i2c"
            echo "clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}, extraaction=${{ inputs.extraaction }}"
            echo "File: ${{ inputs.filename }}.uf2"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.filename }}.uf2
          path: zephyr-workspace/Releases/${{ inputs.filename }}.uf2

      - name: 🚀 Publish/Update 'latest' release (uses GITHUB_TOKEN)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Firmware (ProMicro I2C)"
          body: |
            Manual single-target build:

            Board: promicro_uf2/nrf52840/i2c
            clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}, extraaction=${{ inputs.extraaction }}
            File: ${{ inputs.filename }}.uf2
          files: |
            zephyr-workspace/Releases/${{ inputs.filename }}.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
