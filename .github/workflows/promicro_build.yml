name: Build SlimeNRF Tracker (Manual I2C/SPI)

on:
  workflow_dispatch:
    inputs:
      connection_type:
        description: "Select connection type (i2c or spi)"
        required: true
        type: choice
        options: [i2c, spi]
        default: i2c
      magnetometer:
        description: "Magnetometer"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled
      sleep:
        description: "Sleep (IMU wake + active timeout)"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      sensor_clock:
        description: "External Sensor Clock (clk-gpios)"
        required: true
        type: choice
        options: [enabled, disabled]
        default: enabled
      extra_actions:
        description: "User Extra Actions"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled
      sw0_button:
        description: "SW0 Button"
        required: true
        type: choice
        options: [enabled, disabled]
        default: disabled

      # ===== New: user-defined pins (空字串=不覆寫) =====
      i2c_sda_pin:
        description: "I2C SDA (e.g. P0.6 / 6)"
        required: false
        type: string
        default: ""
      i2c_scl_pin:
        description: "I2C SCL (e.g. P0.8 / 8)"
        required: false
        type: string
        default: ""
      spi_sck_pin:
        description: "SPI SCK (e.g. P0.8 / 8)"
        required: false
        type: string
        default: ""
      spi_mosi_pin:
        description: "SPI MOSI (e.g. P0.6 / 6)"
        required: false
        type: string
        default: ""
      spi_miso_pin:
        description: "SPI MISO (e.g. P0.24 / 24)"
        required: false
        type: string
        default: ""
      spi_cs_pin:
        description: "SPI CS (IMU device CS, e.g. P0.22 / 22)"
        required: false
        type: string
        default: ""
      imu_int_pin:
        description: "IMU INT (e.g. P0.17 / 17)"
        required: false
        type: string
        default: ""
      clk_pin:
        description: "External CLK (e.g. P0.20 / 20)"
        required: false
        type: string
        default: ""
      sw0_pin:
        description: "SW0 pin (e.g. P1.0 / 32)"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BOARD_PREFIX: "promicro_uf2/nrf52840/"
      FILENAME_PREFIX: "SlimeNRF_Tracker_"
      FILEFORMAT: "uf2"

    steps:
      - name: Acquire code (root)
        uses: actions/checkout@v5

      - name: Put commit hash/name in env variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Clean Landing Site
        run: sudo rm -rf zephyr-workspace/SlimeNRF-CI

      - name: Acquire code (manifest at zephyr-workspace/SlimeNRF-CI)
        uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI

      - name: Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel python3-venv xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: Initialize Zephyr Workspace
        run: |
          cd zephyr-workspace
          rm -rf .west
          west init -l SlimeNRF-CI
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: |
          cd zephyr-workspace
          source ~/.venv/bin/activate
          pip3 install -r zephyr/scripts/requirements.txt
          python -c "import elftools.elf.elffile, yaml; print('Zephyr Python deps OK')"

      - name: Preparing Build Environment
        run: |
          cd zephyr-workspace
          rm -rf Releases
          mkdir Releases

      - name: Derive names from input
        run: |
          CONN="${{ inputs.connection_type }}"
          CONN_UPPER=$(echo "$CONN" | tr '[:lower:]' '[:upper:]')
          echo "CONN=$CONN" >> $GITHUB_ENV
          echo "CONN_UPPER=$CONN_UPPER" >> $GITHUB_ENV
          echo "BOARD=${BOARD_PREFIX}${CONN}" >> $GITHUB_ENV
          echo "OUTPUT_NAME=${FILENAME_PREFIX}${CONN_UPPER}_ProMicro" >> $GITHUB_ENV

      - name: Sanity check workspace
        run: |
          ls -la zephyr-workspace
          test -d "zephyr-workspace/SlimeVR-Tracker-nRF" || (echo "SlimeVR-Tracker-nRF missing"; exit 1)

      # ===== New: 產生與 promicro_uf2.dts 相容的 overlay（&i2c0 / &spi3 + pinctrl） =====
      - name: Generate custom pin overlay (match promicro_uf2.dts)
        run: |
          set -e
          cd zephyr-workspace/SlimeVR-Tracker-nRF

          parse_pin() {
            local raw="$1"
            if [ -z "$raw" ]; then echo ""; return; fi
            if [[ "$raw" =~ ^P([01])\.([0-9]{1,2})$ ]]; then
              PORT="${BASH_REMATCH[1]}"; PIN="${BASH_REMATCH[2]}"
            elif [[ "$raw" =~ ^([0-9]{1,2})$ ]]; then
              local n="${BASH_REMATCH[1]}"
              if [ "$n" -ge 32 ]; then PORT=1; PIN=$((n-32)); else PORT=0; PIN="$n"; fi
            else
              echo "Invalid pin format: '$raw' (use P0.xx / P1.xx / abs int)" >&2
              exit 2
            fi
          }

          CONN="${{ inputs.connection_type }}"

          I2C_SDA="${{ inputs.i2c_sda_pin }}"
          I2C_SCL="${{ inputs.i2c_scl_pin }}"
          SPI_SCK="${{ inputs.spi_sck_pin }}"
          SPI_MOSI="${{ inputs.spi_mosi_pin }}"
          SPI_MISO="${{ inputs.spi_miso_pin }}"
          SPI_CS="${{ inputs.spi_cs_pin }}"
          IMU_INT="${{ inputs.imu_int_pin }}"
          CLK_PIN="${{ inputs.clk_pin }}"
          SW0_PIN="${{ inputs.sw0_pin }}"

          OVERLAY="/* Auto-generated by CI: ci_pins.overlay */\n"
          OVERLAY+="#include <zephyr/dt-bindings/pinctrl/nordic-nrf-pinctrl.h>\n"

          if [ "$CONN" = "i2c" ]; then
            if [ -n "$I2C_SDA" ] || [ -n "$I2C_SCL" ]; then
              [ -n "$I2C_SDA" ] && parse_pin "$I2C_SDA" && SDA_PORT="$PORT" && SDA_PIN="$PIN"
              [ -n "$I2C_SCL" ] && parse_pin "$I2C_SCL" && SCL_PORT="$PORT" && SCL_PIN="$PIN"

              OVERLAY+="\n&pinctrl {\n"
              OVERLAY+="  i2c0_user_default: i2c0_user_default {\n"
              OVERLAY+="    group1 {\n"
              OVERLAY+="      psels = "
              if [ -n "$SDA_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SDA, ${SDA_PORT}, ${SDA_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SDA, 0, 6)>"; fi
              OVERLAY+=", "
              if [ -n "$SCL_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SCL, ${SCL_PORT}, ${SCL_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SCL, 0, 8)>"; fi
              OVERLAY+=";\n      bias-disable;\n    };\n  };\n"

              OVERLAY+="  i2c0_user_sleep: i2c0_user_sleep {\n"
              OVERLAY+="    group1 {\n"
              OVERLAY+="      psels = "
              if [ -n "$SDA_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SDA, ${SDA_PORT}, ${SDA_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SDA, 0, 6)>"; fi
              OVERLAY+=", "
              if [ -n "$SCL_PORT" ]; then OVERLAY+="<NRF_PSEL(TWIM_SCL, ${SCL_PORT}, ${SCL_PIN})>"; else OVERLAY+="<NRF_PSEL(TWIM_SCL, 0, 8)>"; fi
              OVERLAY+=";\n      bias-disable;\n      low-power-enable;\n    };\n  };\n};\n"

              OVERLAY+="\n&i2c0 {\n  pinctrl-0 = <&i2c0_user_default>;\n  pinctrl-1 = <&i2c0_user_sleep>;\n};\n"
            fi
          else
            if [ -n "$SPI_SCK" ] || [ -n "$SPI_MOSI" ] || [ -n "$SPI_MISO" ] || [ -n "$SPI_CS" ]; then
              [ -n "$SPI_SCK"  ] && parse_pin "$SPI_SCK"  && SCK_PORT="$PORT"  && SCK_PIN="$PIN"
              [ -n "$SPI_MOSI" ] && parse_pin "$SPI_MOSI" && MOSI_PORT="$PORT" && MOSI_PIN="$PIN"
              [ -n "$SPI_MISO" ] && parse_pin "$SPI_MISO" && MISO_PORT="$PORT" && MISO_PIN="$PIN"
              [ -n "$SPI_CS"   ] && parse_pin "$SPI_CS"   && CS_PORT="$PORT"   && CS_PIN="$PIN"

              OVERLAY+="\n&pinctrl {\n"
              OVERLAY+="  spi3_user_default: spi3_user_default {\n"
              OVERLAY+="    group1 {\n"
              OVERLAY+="      psels = "
              if [ -n "$MISO_PORT" ]; then OVERLAY+="<NRF_PSEL(SPIM_MISO, ${MISO_PORT}, ${MISO_PIN})>"; else OVERLAY+="<NRF_PSEL(SPIM_MISO, 0, 24)>"; fi
              OVERLAY+=", "
              if [ -n "$MOSI_PORT" ]; then OVERLAY+="<NRF_PSEL(SPIM_MOSI, ${MOSI_PORT}, ${MOSI_PIN})>"; else OVERLAY+="<NRF_PSEL(SPIM_MOSI, 0, 6)>"; fi
              OVERLAY+=", "
              if [ -n "$SCK_PORT"  ]; then OVERLAY+="<NRF_PSEL(SPIM_SCK,  ${SCK_PORT},  ${SCK_PIN})>";  else OVERLAY+="<NRF_PSEL(SPIM_SCK,  0, 8)>"; fi
              OVERLAY+=";\n    };\n  };\n"

              OVERLAY+="  spi3_user_sleep: spi3_user_sleep {\n"
              OVERLAY+="    group1 {\n"
              OVERLAY+="      psels = "
              if [ -n "$MISO_PORT" ]; then OVERLAY+="<NRF_PSEL(SPIM_MISO, ${MISO_PORT}, ${MISO_PIN})>"; else OVERLAY+="<NRF_PSEL(SPIM_MISO, 0, 24)>"; fi
              OVERLAY+=", "
              if [ -n "$MOSI_PORT" ]; then OVERLAY+="<NRF_PSEL(SPIM_MOSI, ${MOSI_PORT}, ${MOSI_PIN})>"; else OVERLAY+="<NRF_PSEL(SPIM_MOSI, 0, 6)>"; fi
              OVERLAY+=", "
              if [ -n "$SCK_PORT"  ]; then OVERLAY+="<NRF_PSEL(SPIM_SCK,  ${SCK_PORT},  ${SCK_PIN})>";  else OVERLAY+="<NRF_PSEL(SPIM_SCK,  0, 8)>"; fi
              OVERLAY+=";\n      low-power-enable;\n    };\n  };\n};\n"

              OVERLAY+="\n&spi3 {\n  pinctrl-0 = <&spi3_user_default>;\n  pinctrl-1 = <&spi3_user_sleep>;\n"
              if [ -n "$CS_PORT" ]; then
                OVERLAY+="  cs-gpios = <&gpio${CS_PORT} ${CS_PIN} GPIO_ACTIVE_LOW>;\n"
              fi
              OVERLAY+="};\n"
            fi
          fi

          # zephyr,user: clk-gpios / int0-gpios
          if [ -n "$CLK_PIN" ] || [ -n "$IMU_INT" ]; then
            OVERLAY+="\n/ {\n  zephyr,user {\n"
            if [ -n "$CLK_PIN" ]; then
              parse_pin "$CLK_PIN"
              OVERLAY+="    clk-gpios = <&gpio${PORT} ${PIN} GPIO_OPEN_DRAIN>;\n"
            fi
            if [ -n "$IMU_INT" ]; then
              parse_pin "$IMU_INT"
              OVERLAY+="    int0-gpios = <&gpio${PORT} ${PIN} 0>;\n"
            fi
            OVERLAY+="  };\n};\n"
          fi

          # SW0 覆寫（button0 的 gpios）
          if [ -n "$SW0_PIN" ]; then
            parse_pin "$SW0_PIN"
            OVERLAY+="\n&button0 {\n  gpios = <&gpio${PORT} ${PIN} (GPIO_PULL_UP | GPIO_ACTIVE_LOW)>;\n};\n"
          fi

          printf "%b" "$OVERLAY" > ci_pins.overlay
          echo "===== ci_pins.overlay ====="
          cat ci_pins.overlay || true
          echo "==========================="

      # ===== 功能開關（維持你原有邏輯，僅調 prj.conf；DTS 交給 overlay） =====
      - name: Enable External Sensor Clock
        if: ${{ inputs.sensor_clock == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_SENSOR_CLOCK=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable External Sensor Clock
        if: ${{ inputs.sensor_clock == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_SENSOR_CLOCK=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Enable Extra Actions
        if: ${{ inputs.extra_actions == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USER_EXTRA_ACTIONS=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Extra Actions
        if: ${{ inputs.extra_actions == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USER_EXTRA_ACTIONS=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Enable Magnetometer
        if: ${{ inputs.magnetometer == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_SENSOR_USE_MAG=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Magnetometer
        if: ${{ inputs.magnetometer == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_SENSOR_USE_MAG=n" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Enable Sleep
        if: ${{ inputs.sleep == 'enabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_IMU_WAKE_UP=y" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_USE_ACTIVE_TIMEOUT=y" >> SlimeVR-Tracker-nRF/prj.conf

      - name: Disable Sleep
        if: ${{ inputs.sleep == 'disabled' }}
        run: |
          cd zephyr-workspace
          printf "\nCONFIG_USE_IMU_WAKE_UP=n" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_USE_ACTIVE_TIMEOUT=n" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_SENSOR_LP_TIMEOUT=300000" >> SlimeVR-Tracker-nRF/prj.conf
          printf "\nCONFIG_SENSOR_USE_LOW_POWER_2=n" >> SlimeVR-Tracker-nRF/prj.conf

      # ===== Build =====
      - name: Build SlimeVR-Tracker-nRF (tracker only)
        run: |
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF/build
          mkdir -p SlimeVR-Tracker-nRF/build

          OVERLAY_PATH="SlimeVR-Tracker-nRF/ci_pins.overlay"
          EXTRA_OPT=""
          if [ -s "$OVERLAY_PATH" ]; then
            EXTRA_OPT="-DDTC_OVERLAY_FILE=$(pwd)/$OVERLAY_PATH"
          fi

          west build \
            --board "$BOARD" \
            --pristine=always SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../SlimeVR-Tracker-nRF \
            ${EXTRA_OPT}

          SRC1="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.${FILEFORMAT}"
          SRC2="SlimeVR-Tracker-nRF/build/zephyr/zephyr.${FILEFORMAT}"
          if   [ -f "$SRC1" ]; then SRC="$SRC1";
          elif [ -f "$SRC2" ]; then SRC="$SRC2";
          else
            SRC=$(find SlimeVR-Tracker-nRF/build -path "*/zephyr/zephyr.${FILEFORMAT}" | head -n1)
          fi
          test -n "$SRC" -a -f "$SRC" || { echo "UF2 not found"; find SlimeVR-Tracker-nRF/build -maxdepth 5 -type f | sed 's/^/  /'; exit 1; }

          mv "$SRC" "Releases/$OUTPUT_NAME.${FILEFORMAT}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          path: zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}

      - name: Create/Update Github Release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest"
          prerelease: false
          name: "Latest Firmware"
          body: |
            Manual build of the SlimeNRF Tracker Firmware.
            Board: ${{ env.BOARD }} (Conn: ${{ env.CONN_UPPER }})
            Features:
              MAG=${{ inputs.magnetometer }}, SLEEP=${{ inputs.sleep }},
              CLOCK=${{ inputs.sensor_clock }}, EXTRA=${{ inputs.extra_actions }},
              SW0=${{ inputs.sw0_button }}
            Pins (empty = default):
              I2C: SDA=${{ inputs.i2c_sda_pin }}, SCL=${{ inputs.i2c_scl_pin }}
              SPI: SCK=${{ inputs.spi_sck_pin }}, MOSI=${{ inputs.spi_mosi_pin }}, MISO=${{ inputs.spi_miso_pin }}, CS=${{ inputs.spi_cs_pin }}
              CLK=${{ inputs.clk_pin }}, IMU_INT=${{ inputs.imu_int_pin }}, SW0=${{ inputs.sw0_pin }}
          files: |
            zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          clear_attachments: true
