name: Auto Build (ProMicro Matrix, clean release)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 */12 * * *"   # 每 12 小時
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ===== non-Stacked =====
          - { iface: i2c,   wiring: default, clk: enabled,  sleep: enabled,  sw0: disabled, magnetometer: enabled,  filename: "SlimeNRF_Tracker_I2C_ProMicro" }
          - { iface: i2c,   wiring: default, clk: disabled, sleep: disabled, sw0: disabled, magnetometer: enabled,  filename: "SlimeNRF_Tracker_NoSleep_NoCLK_I2C_ProMicro" }
          - { iface: spi,   wiring: default, clk: enabled,  sleep: enabled,  sw0: enabled,  magnetometer: enabled,  filename: "SlimeNRF_Tracker_SW0_CLK_SPI_ProMicro" }
          - { iface: smspi, wiring: default, clk: disabled, sleep: enabled,  sw0: disabled, magnetometer: enabled,  filename: "SlimeNRF_Tracker_smSPI_ProMicro" }

          # ===== Stacked =====
          - { iface: i2c,   wiring: stacked, clk: enabled,  sleep: enabled,  sw0: enabled,  magnetometer: enabled,  filename: "SlimeNRF_Tracker_I2C_StackedSmol" }
          - { iface: spi,   wiring: stacked, clk: disabled, sleep: disabled, sw0: enabled,  magnetometer: enabled,  filename: "SlimeNRF_Tracker_NoSleep_NoCLK_SPI_StackedSmol" }

    steps:
      - name: 💻 Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🧰 Host deps + west
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf dfu-util device-tree-compiler \
            python3-pip python3-setuptools python3-wheel wget xz-utils file
          pip3 install --upgrade west

      - name: 🪁 Zephyr SDK
        run: |
          set -eux
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Init workspace
        run: |
          set -eux
          west init -l .
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: 🔎 Decide BOARD / APP from matrix
        id: meta
        shell: bash
        run: |
          set -eux
          IFACE="${{ matrix.iface }}"
          WIRING="${{ matrix.wiring }}"
          BOARD="promicro_uf2/nrf52840/${IFACE}"
          APP="SlimeVR-Tracker-nRF"
          if [[ "$WIRING" == "stacked" ]]; then
            APP="Stacked-SmolSlime"
          fi
          echo "board=$BOARD" >> "$GITHUB_OUTPUT"
          echo "app=$APP"     >> "$GITHUB_OUTPUT"
          echo "iface_print=$IFACE" >> "$GITHUB_OUTPUT"
          echo "Using APP=$APP BOARD=$BOARD"

          test -d "$APP" || { echo "::error::App dir '$APP' not found"; exit 1; }

      - name: 📎 (Stacked only) copy fusion libs
        if: ${{ steps.meta.outputs.app == 'Stacked-SmolSlime' }}
        run: |
          set -eux
          cp -r SlimeVR-Tracker-nRF/vqf-c                  Stacked-SmolSlime/ || true
          cp -r SlimeVR-Tracker-nRF/Fusion                 Stacked-SmolSlime/ || true
          cp -r SlimeVR-Tracker-nRF/NXP-ISSDK-SensorFusion Stacked-SmolSlime/ || true

      - name: 🔧 Generate kconfig overlay (no touching prj.conf)
        run: |
          set -eux
          : > kconfig_user.conf
          {
            if [[ "${{ matrix.clk }}" == "enabled" ]];   then echo "CONFIG_USE_SENSOR_CLOCK=y"; else echo "CONFIG_USE_SENSOR_CLOCK=n"; fi
            if [[ "${{ matrix.sleep }}" == "enabled" ]]; then
              echo "CONFIG_USE_IMU_WAKE_UP=y"
              echo "CONFIG_USE_ACTIVE_TIMEOUT=y"
            else
              echo "CONFIG_USE_IMU_WAKE_UP=n"
              echo "CONFIG_USE_ACTIVE_TIMEOUT=n"
              echo "CONFIG_SENSOR_LP_TIMEOUT=300000"
              echo "CONFIG_SENSOR_USE_LOW_POWER_2=n"
            fi
            if [[ "${{ matrix.magnetometer }}" == "enabled" ]]; then echo "CONFIG_SENSOR_USE_MAG=y"; else echo "CONFIG_SENSOR_USE_MAG=n"; fi
            if [[ "${{ matrix.sw0 }}" == "enabled" ]]; then echo "CONFIG_USER_SW0=y"; else echo "CONFIG_USER_SW0=n"; fi
          } >> kconfig_user.conf
          echo "--- kconfig_user.conf ---"
          cat kconfig_user.conf

      - name: 🔨 Build
        run: |
          set -eux
          APP="${{ steps.meta.outputs.app }}"
          BOARD="${{ steps.meta.outputs.board }}"
          mkdir -p build
          west build --board "$BOARD" "$APP" --pristine=always -d build -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../"$APP" \
            -DEXTRA_CONF_FILE=$(pwd)/kconfig_user.conf

      - name: 📦 Collect artifact
        run: |
          set -eux
          mkdir -p zephyr-workspace/Releases
          if [[ -f build/zephyr/zephyr.uf2 ]]; then
            cp build/zephyr/zephyr.uf2 "zephyr-workspace/Releases/${{ matrix.filename }}.uf2"
          fi
          if [[ -f build/zephyr/zephyr.hex ]]; then
            cp build/zephyr/zephyr.hex "zephyr-workspace/Releases/${{ matrix.filename }}.hex"
          fi
          ls -la zephyr-workspace/Releases

      - name: ⏫ Upload per-matrix artifact (for Actions page)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}
          path: zephyr-workspace/Releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout (empty – just to own workspace)
        uses: actions/checkout@v4

      - name: ⬇️ Download all artifacts from matrix
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: 🧹 Delete existing 'latest' release + tag (clean replace)
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Create fresh 'latest' release with all files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Firmware
          body: |
            Automated matrix build of ProMicro firmware.
            - App variants: SlimeVR-Tracker-nRF / Stacked-SmolSlime
            - Interfaces: i2c / spi / smspi
            - Toggles: clk / sleep / sw0 / magnetometer
          files: |
            collected/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
