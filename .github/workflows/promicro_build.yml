name: Build ProMicro (manual, stacked/non-stacked, toggles)

on:
  workflow_dispatch:
    inputs:
      iface:
        description: "介面 (i2c / spi / smspi)"
        type: choice
        required: true
        options: [i2c, spi, smspi]
        default: i2c
      wiring:
        description: "接線 (non-Stacked=default / Stacked=stacked)"
        type: choice
        required: true
        options: [default, stacked]
        default: default
      clk:
        description: "外部時鐘"
        type: choice
        required: true
        options: [enabled, disabled]
        default: enabled
      sleep:
        description: "睡眠模式"
        type: choice
        required: true
        options: [enabled, disabled]
        default: enabled
      sw0:
        description: "SW0 按鍵"
        type: choice
        required: true
        options: [enabled, disabled]
        default: disabled
      magnetometer:
        description: "磁力計"
        type: choice
        required: true
        options: [enabled, disabled]
        default: enabled
      filename:
        description: "輸出檔名（不含副檔名）"
        type: string
        required: true
        default: "SlimeNRF_Tracker_ProMicro"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🧰 Host deps + west
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build gperf dfu-util device-tree-compiler \
            python3-pip python3-setuptools python3-wheel wget xz-utils file
          pip3 install --upgrade west

      - name: 🪁 Zephyr SDK
        run: |
          set -euxo pipefail
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Init workspace
        run: |
          set -euxo pipefail
          west init -l .
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: 🔎 Decide BOARD / APP
        id: meta
        shell: bash
        run: |
          set -euxo pipefail
          IFACE="${{ inputs.iface }}"
          WIRING="${{ inputs.wiring }}"

          BOARD="promicro_uf2/nrf52840/${IFACE}"
          APP="SlimeVR-Tracker-nRF"
          if [[ "$WIRING" == "stacked" ]]; then
            APP="Stacked-SmolSlime"
          fi

          echo "board=$BOARD" >> "$GITHUB_OUTPUT"
          echo "app=$APP"     >> "$GITHUB_OUTPUT"
          echo "iface_print=$IFACE" >> "$GITHUB_OUTPUT"

          # 檢查專案目錄是否存在（避免 prj.conf 找不到）
          test -d "$APP" || { echo "::error::App dir '$APP' not found at repo root"; exit 1; }

      - name: 📎 (Stacked only) copy fusion libs
        if: ${{ steps.meta.outputs.app == 'Stacked-SmolSlime' }}
        run: |
          set -euxo pipefail
          cp -r SlimeVR-Tracker-nRF/vqf-c                  Stacked-SmolSlime/ || true
          cp -r SlimeVR-Tracker-nRF/Fusion                 Stacked-SmolSlime/ || true
          cp -r SlimeVR-Tracker-nRF/NXP-ISSDK-SensorFusion Stacked-SmolSlime/ || true

      - name: 🔧 Generate Kconfig overlay (不修改 prj.conf)
        run: |
          set -euxo pipefail
          : > kconfig_user.conf
          {
            if [[ "${{ inputs.clk }}" == "enabled" ]];   then echo "CONFIG_USE_SENSOR_CLOCK=y"; else echo "CONFIG_USE_SENSOR_CLOCK=n"; fi
            if [[ "${{ inputs.sleep }}" == "enabled" ]]; then
              echo "CONFIG_USE_IMU_WAKE_UP=y"
              echo "CONFIG_USE_ACTIVE_TIMEOUT=y"
            else
              echo "CONFIG_USE_IMU_WAKE_UP=n"
              echo "CONFIG_USE_ACTIVE_TIMEOUT=n"
              echo "CONFIG_SENSOR_LP_TIMEOUT=300000"
              echo "CONFIG_SENSOR_USE_LOW_POWER_2=n"
            fi
            if [[ "${{ inputs.magnetometer }}" == "enabled" ]]; then echo "CONFIG_SENSOR_USE_MAG=y"; else echo "CONFIG_SENSOR_USE_MAG=n"; fi
            if [[ "${{ inputs.sw0 }}" == "enabled" ]]; then echo "CONFIG_USER_SW0=y"; else echo "CONFIG_USER_SW0=n"; fi
          } >> kconfig_user.conf
          echo "--- kconfig_user.conf ---"
          cat kconfig_user.conf

      - name: 🔨 Build
        run: |
          set -euxo pipefail
          APP="${{ steps.meta.outputs.app }}"
          BOARD="${{ steps.meta.outputs.board }}"
          mkdir -p build
          west build --board "$BOARD" "$APP" --pristine=always -d build -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT=../"$APP" \
            -DEXTRA_CONF_FILE=$(pwd)/kconfig_user.conf

      - name: 📦 Collect outputs（使用指定檔名）
        run: |
          set -euxo pipefail
          mkdir -p output
          if [[ -f build/zephyr/zephyr.uf2 ]]; then
            cp build/zephyr/zephyr.uf2 "output/${{ inputs.filename }}.uf2"
          fi
          if [[ -f build/zephyr/zephyr.hex ]]; then
            cp build/zephyr/zephyr.hex "output/${{ inputs.filename }}.hex"
          fi
          ls -la output

      - name: 🧾 Job Summary
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Board | \`promicro_uf2/nrf52840/${{ steps.meta.outputs.iface_print }}\` |"
            echo "| Wiring | \`${{ inputs.wiring }}\` |"
            echo "| APP | \`${{ steps.meta.outputs.app }}\` |"
            echo "| Clock | \`${{ inputs.clk }}\` |"
            echo "| Sleep | \`${{ inputs.sleep }}\` |"
            echo "| SW0 | \`${{ inputs.sw0 }}\` |"
            echo "| Magnetometer | \`${{ inputs.magnetometer }}\` |"
            echo "| Filename | \`${{ inputs.filename }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🗑️ Delete existing 'latest' release + tag
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Create fresh 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Firmware (ProMicro)
          body: |
            Manual build for ProMicro.
            - App: ${{ steps.meta.outputs.app }}
            - Interface: ${{ steps.meta.outputs.iface_print }}
            - Toggles: clk=${{ inputs.clk }}, sleep=${{ inputs.sleep }}, sw0=${{ inputs.sw0 }}, magnetometer=${{ inputs.magnetometer }}
          files: |
            output/${{ inputs.filename }}.uf2
            output/${{ inputs.filename }}.hex
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
