name: Build SlimeNRF Tracker (Manual I2C/SPI Choice)

on:
  workflow_dispatch:
    inputs:
      connection_type:
        description: "Select connection type (i2c or spi)"
        required: true
        type: choice
        options:
          - i2c
          - spi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BOARD_PREFIX: "promicro_uf2/nrf52840/"
      FILENAME_PREFIX: "SlimeNRF_Tracker_"
      FILEFORMAT: "uf2"

    steps:
      - name: 💻 Acquire code
        uses: actions/checkout@v5

      - name: 🧰 Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
          git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
          wget python3-dev python3-pip python3-setuptools python3-wheel \
          python3-venv xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: 🪁 Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Initialize Zephyr Workspace
        run: |
          mkdir -p zephyr-workspace
          cd zephyr-workspace
          west init -l ../
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: 🔧 Preparing Build Environment
        run: |
          cd zephyr-workspace
          mkdir -p Releases

      - name: 🧮 Derive names from input
        run: |
          CONN="${{ inputs.connection_type }}"            # i2c 或 spi
          CONN_UPPER=$(echo "$CONN" | tr '[:lower:]' '[:upper:]')
          echo "CONN=$CONN" >> $GITHUB_ENV
          echo "CONN_UPPER=$CONN_UPPER" >> $GITHUB_ENV
          echo "BOARD=${BOARD_PREFIX}${CONN}" >> $GITHUB_ENV
          echo "OUTPUT_NAME=${FILENAME_PREFIX}${CONN_UPPER}_ProMicro" >> $GITHUB_ENV

      - name: 🔨 Build Firmware
        run: |
          cd zephyr-workspace
          echo "🏗️ Building for board: $BOARD"
          echo "📦 Output file: $OUTPUT_NAME.${FILEFORMAT}"

          west build \
              --board "$BOARD" \
              --pristine=always SlimeVR-Tracker-nRF \
              --build-dir build \
              -- \
              -DNCS_TOOLCHAIN_VERSION=NONE \
              -DBOARD_ROOT=../SlimeVR-Tracker-nRF

          mv build/SlimeVR-Tracker-nRF/zephyr/zephyr.${FILEFORMAT} "Releases/$OUTPUT_NAME.${FILEFORMAT}"

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          path: zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}

      - name: 📁 Create/Update Github Release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.gh_token }}
          tag: "latest"
          prerelease: false
          name: "Latest Tracker Firmware"
          body: |
            Manual build of SlimeNRF Tracker Firmware for: ${{ env.CONN_UPPER }}
          files: |
            zephyr-workspace/Releases/${{ env.OUTPUT_NAME }}.${{ env.FILEFORMAT }}
          clear_attachments: false
