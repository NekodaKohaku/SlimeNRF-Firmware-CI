name: Build SlimeNRF Tracker (Manual I2C/SPI Choice)

on:
  workflow_dispatch:
    inputs:
      board_type:
        description: "Select tracker type to build"
        required: true
        type: choice
        options:
          - tracker_i2c
          - tracker_spi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: tracker_i2c
            boardname: "promicro_uf2/nrf52840/i2c"
            fileformat: "uf2"
            filename: "SlimeNRF_Tracker_I2C_ProMicro"
          - id: tracker_spi
            boardname: "promicro_uf2/nrf52840/spi"
            fileformat: "uf2"
            filename: "SlimeNRF_Tracker_SPI_ProMicro"

    steps:
      - name: 💻 Acquire code
        uses: actions/checkout@v5

      - name: 🧰 Install Dependencies + West
        run: |
          sudo apt-get update && sudo apt install --no-install-recommends \
          git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
          wget python3-dev python3-pip python3-setuptools python3-wheel \
          python3-venv xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          pip3 install west ninja

      - name: 🪁 Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-0.17.2/setup.sh -c -t arm-zephyr-eabi

      - name: ♻️ Initialize Zephyr Workspace
        run: |
          mkdir -p zephyr-workspace
          cd zephyr-workspace
          west init -l ../
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: 🔧 Preparing Build Environment
        run: |
          cd zephyr-workspace
          mkdir -p Releases

      - name: 🔨 Build Firmware
        if: ${{ matrix.id == inputs.board_type }}
        run: |
          cd zephyr-workspace
          west build \
              --board ${{ matrix.boardname }} \
              --pristine=always SlimeVR-Tracker-nRF \
              --build-dir build \
              -- \
              -DNCS_TOOLCHAIN_VERSION=NONE \
              -DBOARD_ROOT=../SlimeVR-Tracker-nRF
          mv build/SlimeVR-Tracker-nRF/zephyr/zephyr.${{ matrix.fileformat }} Releases/${{ matrix.filename }}.${{ matrix.fileformat }}

      - name: 💾 Upload Artifact
        if: ${{ matrix.id == inputs.board_type }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}.${{ matrix.fileformat }}
          path: zephyr-workspace/Releases/${{ matrix.filename }}.${{ matrix.fileformat }}

      - name: 📁 Create/Update Github Release
        if: ${{ matrix.id == inputs.board_type }}
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.gh_token }}
          tag: "latest"
          prerelease: false
          name: "Latest Tracker Firmware"
          body: |
            Manual build of SlimeNRF Tracker Firmware for: ${{ inputs.board_type }}
          files: |
            zephyr-workspace/Releases/${{ matrix.filename }}.${{ matrix.fileformat }}
          clear_attachments: false
