name: Proxy Firmware Build Trigger

on:
  workflow_dispatch:
    inputs:
      board:
        description: "選擇開發板 (例如 xiao_ble/nrf52840)"
        required: true
        type: string
      filename:
        description: "輸出檔案名稱 (例如 SlimeNRF_Tracker_XIAO)"
        required: true
        type: string
      clk:
        description: "外部時鐘 (enabled/disabled)"
        required: false
        default: "enabled"
      sleep:
        description: "睡眠模式 (enabled/disabled)"
        required: false
        default: "enabled"

jobs:
  trigger_public_build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main public_build workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/public_build.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"board\":\"${{ github.event.inputs.board }}\",\"filename\":\"${{ github.event.inputs.filename }}\",\"clk\":\"${{ github.event.inputs.clk }}\",\"sleep\":\"${{ github.event.inputs.sleep }}\"}}"
