name: Public Firmware Builder

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Target board path (e.g. promicro_uf2/nrf52840/i2c)"
        required: true
        type: string
      filename:
        description: "Output filename"
        required: true
        type: string
      clk:
        description: "Clock enable/disable"
        required: false
        default: "enabled"
        type: string
      sleep:
        description: "Sleep mode enable/disable"
        required: false
        default: "enabled"
        type: string
      sw0:
        description: "SW0 enable/disable"
        required: false
        default: "enabled"
        type: string
      magnetometer:
        description: "Magnetometer enable/disable"
        required: false
        default: "enabled"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zephyr build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gperf cmake python3-pip
          pip install west
          west init -l .
          west update

      - name: Apply dynamic configuration
        run: |
          echo "🔧 Applying build options..."
          echo "Board: ${{ github.event.inputs.board }}"
          echo "Clock: ${{ github.event.inputs.clk }}"
          echo "Sleep: ${{ github.event.inputs.sleep }}"
          echo "SW0: ${{ github.event.inputs.sw0 }}"
          echo "Magnetometer: ${{ github.event.inputs.magnetometer }}"

          DTS_PATH="boards/nordic/${{ github.event.inputs.board }}.dts"
          echo "Target DTS: $DTS_PATH"

          if [ -f "$DTS_PATH" ]; then
            echo "Modifying $DTS_PATH ..."

            # Disable external clock if requested
            if [ "${{ github.event.inputs.clk }}" = "disabled" ]; then
              sed -i 's/clk-gpios = <[^>]*>;/\/\/ clk disabled/g' "$DTS_PATH"
            fi

            # Disable SW0 if requested
            if [ "${{ github.event.inputs.sw0 }}" = "disabled" ]; then
              sed -i 's/aliases {[^}]*sw0[^}]*};/\/\/ sw0 disabled/g' "$DTS_PATH"
            fi

            # Disable magnetometer node
            if [ "${{ github.event.inputs.magnetometer }}" = "disabled" ]; then
              sed -i 's/mag: mag@0 {[^}]*};/\/\/ magnetometer disabled/g' "$DTS_PATH"
            fi
          else
            echo "⚠️ DTS file not found: $DTS_PATH"
          fi

      - name: Build firmware
        run: |
          echo "🚧 Building firmware..."
          west build -b ${{ github.event.inputs.board }} app -- -DOUTPUT_NAME=${{ github.event.inputs.filename }}

      - name: Package firmware
        run: |
          mkdir -p output
          if [ -f build/zephyr/zephyr.uf2 ]; then
            cp build/zephyr/zephyr.uf2 output/${{ github.event.inputs.filename }}
          elif [ -f build/zephyr/zephyr.hex ]; then
            cp build/zephyr/zephyr.hex output/${{ github.event.inputs.filename }}
          else
            echo "❌ No output file found in build/zephyr/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.filename }}
          path: output/${{ github.event.inputs.filename }}
