name: Public Firmware Builder

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board target path'
        required: true
      filename:
        description: 'Output filename'
        required: true
      clk:
        description: 'Clock setting'
        required: true
      sleep:
        description: 'Sleep mode'
        required: true
      sw0:
        description: 'SW0 enable'
        required: true
      magnetometer:
        description: 'Magnetometer'
        required: true
      pinmode:
        description: 'Pin wiring mode (stacked/nonstacked/custom/default)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup west / Zephyr
        run: |
          pip install west
          west init -l .
          west update

      - name: Select board build
        run: |
          echo "Pin mode: ${{ github.event.inputs.pinmode }}"
          case "${{ github.event.inputs.pinmode }}" in
            stacked)
              BOARD_TARGET="promicro_uf2_i2c_stacked"
              ;;
            nonstacked)
              BOARD_TARGET="promicro_uf2_i2c_nonstacked"
              ;;
            custom)
              BOARD_TARGET="promicro_uf2_i2c_custom"
              ;;
            *)
              BOARD_TARGET="${{ github.event.inputs.board }}"
              ;;
          esac

          echo "Building board: $BOARD_TARGET"
          mkdir -p build
          west build -b "$BOARD_TARGET" -d build

      - name: Archive firmware
        run: |
          mkdir -p output
          cp build/zephyr/zephyr.uf2 output/${{ github.event.inputs.filename }} || true
          cp build/zephyr/zephyr.hex output/${{ github.event.inputs.filename }} || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: output/
