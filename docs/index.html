<script>
/* ==================== GitHub Device Flow OAuth ==================== */
const CLIENT_ID = "Ov23lipHbwgfbIyxXe7P"; // 你的 GitHub OAuth App client ID
let accessToken = null;

/* ==================== Language handling ==================== */
function detectLanguage() {
  const lang = navigator.language.toLowerCase();
  if (lang.includes("zh")) return "zh";
  if (lang.includes("ja")) return "ja";
  return "en";
}
function setLanguage(lang) {
  const actual = lang === "auto" ? detectLanguage() : lang;
  const t = getLangTexts(actual);
  document.getElementById("title").textContent = t.title;
  document.getElementById("lbl-board").textContent = t.board;
  document.getElementById("lbl-iface").textContent = t.iface;
  document.getElementById("lbl-wiring").textContent = t.wiring;
  document.getElementById("hint-wiring").textContent = t.hintWiring;
  document.getElementById("lbl-pinmode").textContent = t.pinmode;
  document.getElementById("hint-custom").textContent = t.hintCustom;
  document.getElementById("lbl-clk").textContent = t.clk;
  document.getElementById("lbl-sleep").textContent = t.sleep;
  document.getElementById("lbl-sw0").textContent = t.sw0;
  document.getElementById("lbl-mag").textContent = t.mag;
  document.getElementById("lbl-filename").textContent = t.filename;
  document.getElementById("btn-build").textContent = t.build;
}
document.getElementById("langSelect").addEventListener("change", e => setLanguage(e.target.value));
setLanguage("auto");

/* ==================== OAuth login (with debug) ==================== */
async function githubLogin() {
  const status = document.getElementById("status");
  try {
    console.log("[OAuth] Requesting device code…");
    const deviceResp = await fetch("https://github.com/login/device/code", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json" },
      body: `client_id=${CLIENT_ID}&scope=repo`
    });
    const deviceData = await deviceResp.json();
    console.log("[OAuth] Device Code Response:", deviceData);

    if (!deviceData.user_code) throw new Error("無法取得授權碼，請檢查 CLIENT_ID 或 GitHub 服務。");

    // 顯示提示並自動開啟登入頁
    alert(`請在新開的頁面中輸入以下代碼完成授權：\n\n${deviceData.user_code}`);
    window.open(deviceData.verification_uri, "_blank");

    const start = Date.now();
    while (Date.now() - start < deviceData.expires_in * 1000) {
      await new Promise(r => setTimeout(r, deviceData.interval * 1000));
      const poll = await fetch("https://github.com/login/oauth/access_token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json" },
        body: `client_id=${CLIENT_ID}&device_code=${deviceData.device_code}&grant_type=urn:ietf:params:oauth:grant-type:device_code`
      });
      const res = await poll.json();
      console.log("[OAuth] Polling Response:", res);

      if (res.access_token) {
        accessToken = res.access_token;
        console.log("[OAuth] Access token received.");
        return accessToken;
      }
      if (res.error) {
        if (res.error === "authorization_pending") {
          status.textContent = "等待授權中，請在 GitHub 頁面輸入驗證碼...";
        } else if (res.error === "slow_down") {
          console.warn("[OAuth] API 要求放慢輪詢速度");
        } else if (res.error === "access_denied") {
          throw new Error("授權被拒絕。請重新登入並允許應用程式權限。");
        } else if (res.error === "expired_token") {
          throw new Error("授權碼已過期，請重新登入。");
        } else {
          throw new Error(`未知授權錯誤：${res.error}`);
        }
      }
    }
    throw new Error("登入逾時或被取消。");
  } catch (e) {
    console.error("[OAuth] Login error:", e);
    throw e;
  }
}

/* ==================== Board definitions ==================== */
const boardConfigs = {
  xiao_ble: { board: "xiao_ble/nrf52840", iface: ["i2c"], fileformat: "uf2" },
  promicro: { board: "promicro_uf2/nrf52840", iface: ["i2c", "spi", "smspi"], fileformat: "uf2" },
  mini: { board: "slimevrmini_p4_uf2/nrf52833", iface: ["i2c"], fileformat: "uf2" },
  mochi: { board: "mochi_uf2/nrf52833", iface: ["i2c"], fileformat: "uf2" },
  dongle: { board: "nrf52840dongle/nrf52840", iface: [], fileformat: "hex" }
};

/* ==================== Dynamic options & UI logic ==================== */
const boardSelect = document.getElementById("board");
const ifaceSelect = document.getElementById("iface");
const wiringBlock = document.getElementById("wiringBlock");
const wiringSelect = document.getElementById("wiring");
const pinmodeSelect = document.getElementById("pinmode");
const customPins = document.getElementById("customPins");

boardSelect.addEventListener("change", () => {
  ifaceSelect.innerHTML = "";
  ifaceSelect.disabled = true;
  const key = boardSelect.value;
  wiringBlock.classList.toggle("hidden", key !== "promicro");

  if (key && boardConfigs[key]) {
    const ifaceList = boardConfigs[key].iface;
    if (ifaceList.length > 0) {
      ifaceSelect.disabled = false;
      ifaceList.forEach(i => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = i.toUpperCase();
        ifaceSelect.appendChild(opt);
      });
    } else {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "{NA}";
      ifaceSelect.appendChild(opt);
    }
  }
  updateFilename();
});

pinmodeSelect.addEventListener("change", () => {
  customPins.classList.toggle("hidden", pinmodeSelect.value !== "custom");
  updateFilename();
});

[wiringSelect, ifaceSelect].forEach(el => el.addEventListener("change", updateFilename));
["iface","clk","sleep","sw0","mag"].forEach(id =>
  document.getElementById(id).addEventListener("change", updateFilename)
);

function updateFilename() {
  const key = boardSelect.value;
  if (!key) { document.getElementById("filename").value = ""; return; }
  const iface = ifaceSelect.value;
  const clk = document.getElementById("clk").value;
  const sleep = document.getElementById("sleep").value;
  const sw0 = document.getElementById("sw0").value;
  const pinmode = pinmodeSelect.value;
  const wiring = (boardSelect.value === "promicro") ? wiringSelect.value : "default";
  const cfg = boardConfigs[key];
  const tagIface = iface ? "_" + iface.toUpperCase() : "";
  const tagWiring = (boardSelect.value === "promicro" && wiring === "stacked") ? "_StackedSmol" : "";
  const tagMode = (pinmode === "custom") ? "_CustomPins" : "";
  const name = `SlimeNRF_Tracker${tagIface}_${key}${tagWiring}_${clk}_${sleep}_${sw0}${tagMode}.${cfg.fileformat}`;
  document.getElementById("filename").value = name;
}

/* ==================== Trigger GitHub Action ==================== */
const api = "https://api.github.com/repos/NekodaKohaku/SlimeNRF-Firmware-CI/actions/workflows/public_build.yml/dispatches";
document.getElementById("btn-build").onclick = async function triggerBuild() {
  const lang = detectLanguage();
  const t = getLangTexts(lang);
  const key = boardSelect.value;
  const status = document.getElementById("status");
  if (!key) { status.textContent = t.selectBoard; return; }

  if (!accessToken) {
    status.textContent = t.loginStart;
    try {
      await githubLogin();
      status.textContent = t.loginSuccess;
    } catch (e) {
      status.textContent = "授權失敗：" + e.message;
      return;
    }
  }

  const iface = ifaceSelect.value;
  const clk = document.getElementById("clk").value;
  const sleep = document.getElementById("sleep").value;
  const sw0 = document.getElementById("sw0").value;
  const magnetometer = document.getElementById("mag").value;
  const pinmode = pinmodeSelect.value;
  const wiring = (key === "promicro") ? wiringSelect.value : "default";
  const cfg = boardConfigs[key];
  const board = cfg.board + (iface ? `/${iface}` : "");
  const filename = document.getElementById("filename").value;
  const pins = {
    sda: document.getElementById("pin-sda").value.trim(),
    scl: document.getElementById("pin-scl").value.trim(),
    mosi: document.getElementById("pin-mosi").value.trim(),
    miso: document.getElementById("pin-miso").value.trim(),
    sck: document.getElementById("pin-sck").value.trim(),
    cs:  document.getElementById("pin-cs").value.trim(),
    int0: document.getElementById("pin-int0").value.trim(),
    led:  document.getElementById("pin-led").value.trim(),
    clk_pin: document.getElementById("pin-clk").value.trim(),
    vcc:  document.getElementById("pin-vcc").value.trim()
  };

  status.textContent = t.building;
  console.log("[Build] Triggering workflow with inputs:", { board, filename, clk, sleep, sw0, magnetometer, pinmode, wiring, ...pins });

  try {
    const r = await fetch(api, {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": `Bearer ${accessToken}`
      },
      body: JSON.stringify({
        ref: "main",
        inputs: { board, filename, clk, sleep, sw0, magnetometer, pinmode, wiring, ...pins }
      })
    });
    console.log("[Build] Response:", r.status, r.statusText);
    status.textContent = r.ok ? t.success : (t.failed + " " + r.statusText);
  } catch (err) {
    console.error("[Build] Error:", err);
    status.textContent = t.failed + " " + err.message;
  }
};
</script>
