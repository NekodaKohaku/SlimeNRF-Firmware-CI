<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>SlimeNRF Firmware Builder</title>
  <script src="lang.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 40px auto; background:#fafafa; }
    label { display:block; margin-top:12px; font-weight:600; }
    select, input, button { width:100%; padding:8px; margin-top:6px; border-radius:6px; border:1px solid #ccc; }
    button { background:#4CAF50; color:#fff; border:none; font-size:16px; cursor:pointer; margin-top:14px; }
    button:hover { background:#45a049; }
    #status { font-weight:bold; margin-top:12px; min-height:24px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .lang-switch { float:right; margin-bottom:10px; }
    .hint { color:#666; font-size:12px; margin-top:4px; }
    .muted { color:#777; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <select id="langSelect">
      <option value="auto">🌐 Auto</option>
      <option value="zh">繁體中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <h1 id="title"></h1>

  <label id="lbl-board"></label>
  <select id="board">
    <option value="">{NA}</option>
    <option value="xiao_ble">XIAO BLE / Sense</option>
    <option value="promicro">ProMicro</option>
    <option value="mini">SlimeVR Mini</option>
    <option value="mochi">Mochi</option>
    <option value="dongle">Nordic Dongle</option>
  </select>

  <label id="lbl-iface"></label>
  <select id="iface" disabled>
    <option value="">{NA}</option>
  </select>

  <div id="wiringBlock" class="hidden">
    <label id="lbl-wiring"></label>
    <select id="wiring">
      <option value="default">Default (non-Stacked)</option>
      <option value="stacked">StackedSmol</option>
    </select>
    <div class="hint" id="hint-wiring"></div>
  </div>

  <label id="lbl-pinmode"></label>
  <select id="pinmode">
    <option value="preset">Preset</option>
    <option value="custom">Custom</option>
  </select>

  <div id="customPins" class="hidden">
    <div class="hint" id="hint-custom"></div>
    <div class="row">
      <div><label>I2C SDA</label><input id="pin-sda" placeholder="e.g. 26 or P0.26" /></div>
      <div><label>I2C SCL</label><input id="pin-scl" placeholder="e.g. 27 or P0.27" /></div>
    </div>
    <div class="row">
      <div><label>SPI MOSI</label><input id="pin-mosi" /></div>
      <div><label>SPI MISO</label><input id="pin-miso" /></div>
    </div>
    <div class="row">
      <div><label>SPI SCK</label><input id="pin-sck" /></div>
      <div><label>SPI CS</label><input id="pin-cs" /></div>
    </div>
    <div class="row">
      <div><label>INT0</label><input id="pin-int0" /></div>
      <div><label>LED</label><input id="pin-led" /></div>
    </div>
    <div class="row">
      <div><label>CLK</label><input id="pin-clk" /></div>
      <div><label>VCC EN</label><input id="pin-vcc" /></div>
    </div>
  </div>

  <div class="row">
    <div><label id="lbl-clk"></label><select id="clk"><option value="enabled">enabled</option><option value="disabled">disabled</option></select></div>
    <div><label id="lbl-sleep"></label><select id="sleep"><option value="enabled">enabled</option><option value="disabled">disabled</option></select></div>
  </div>

  <div class="row">
    <div><label id="lbl-sw0"></label><select id="sw0"><option value="disabled">disabled</option><option value="enabled">enabled</option></select></div>
    <div><label id="lbl-mag"></label><select id="mag"><option value="enabled">enabled</option><option value="disabled">disabled</option></select></div>
  </div>

  <label id="lbl-filename"></label>
  <input id="filename" readonly />
  <button id="btn-build"></button>
  <p id="status"></p>

<script>
const boardConfigs = {
  xiao_ble: { board: "xiao_ble/nrf52840", iface: ["i2c"], fileformat: "uf2" },
  promicro: { board: "promicro_uf2/nrf52840", iface: ["i2c","spi","smspi"], fileformat: "uf2" },
  mini: { board: "slimevrmini_p4_uf2/nrf52833", iface: ["i2c"], fileformat: "uf2" },
  mochi: { board: "mochi_uf2/nrf52833", iface: ["i2c"], fileformat: "uf2" },
  dongle: { board: "nrf52840dongle/nrf52840", iface: [], fileformat: "hex" }
};

function detectLanguage() {
  const lang = navigator.language.toLowerCase();
  if (lang.includes("zh")) return "zh";
  if (lang.includes("ja")) return "ja";
  return "en";
}

function setLanguage(lang) {
  const actual = lang === "auto" ? detectLanguage() : lang;
  const t = getLangTexts(actual);
  document.getElementById("title").textContent = t.title;
  document.getElementById("lbl-board").textContent = t.board;
  document.getElementById("lbl-iface").textContent = t.iface;
  document.getElementById("lbl-wiring").textContent = t.wiring;
  document.getElementById("lbl-pinmode").textContent = t.pinmode;
  document.getElementById("lbl-clk").textContent = t.clk;
  document.getElementById("lbl-sleep").textContent = t.sleep;
  document.getElementById("lbl-sw0").textContent = t.sw0;
  document.getElementById("lbl-mag").textContent = t.mag;
  document.getElementById("lbl-filename").textContent = t.filename;
  document.getElementById("btn-build").textContent = t.build;
}
document.getElementById("langSelect").addEventListener("change", e => setLanguage(e.target.value));
setLanguage("auto");

const boardSelect = document.getElementById("board");
const ifaceSelect = document.getElementById("iface");
const wiringSelect = document.getElementById("wiring");
const pinmodeSelect = document.getElementById("pinmode");
const customPins = document.getElementById("customPins");

boardSelect.addEventListener("change", updateIface);
pinmodeSelect.addEventListener("change", () => {
  customPins.classList.toggle("hidden", pinmodeSelect.value !== "custom");
  updateFilename();
});
[wiringSelect, ifaceSelect].forEach(el => el.addEventListener("change", updateFilename));
["iface","clk","sleep","sw0","mag"].forEach(id => document.getElementById(id).addEventListener("change", updateFilename));

function updateIface() {
  ifaceSelect.innerHTML = "";
  const key = boardSelect.value;
  const cfg = boardConfigs[key];
  if (!cfg) return;
  if (cfg.iface.length) {
    ifaceSelect.disabled = false;
    cfg.iface.forEach(i => {
      const opt = document.createElement("option");
      opt.value = i; opt.textContent = i.toUpperCase();
      ifaceSelect.appendChild(opt);
    });
  } else {
    ifaceSelect.disabled = true;
    ifaceSelect.innerHTML = "<option value=''>{NA}</option>";
  }
  document.getElementById("wiringBlock").classList.toggle("hidden", key !== "promicro");
  updateFilename();
}

function updateFilename() {
  const key = boardSelect.value;
  if (!key) return;
  const iface = ifaceSelect.value;
  const clk = document.getElementById("clk").value;
  const sleep = document.getElementById("sleep").value;
  const sw0 = document.getElementById("sw0").value;
  const pinmode = pinmodeSelect.value;
  const wiring = (key === "promicro") ? wiringSelect.value : "default";
  const tagIface = iface ? "_" + iface.toUpperCase() : "";
  const tagWiring = (key === "promicro" && wiring === "stacked") ? "_StackedSmol" : "";
  const tagMode = (pinmode === "custom") ? "_CustomPins" : "";
  const cfg = boardConfigs[key];
  document.getElementById("filename").value =
    `SlimeNRF_Tracker${tagIface}_${key}${tagWiring}_${clk}_${sleep}_${sw0}${tagMode}.${cfg.fileformat}`;
}

document.getElementById("btn-build").onclick = async function triggerBuild() {
  const status = document.getElementById("status");
  const key = boardSelect.value;
  if (!key) { status.textContent = "請選擇板子"; return; }
  status.textContent = "正在提交構建請求…";

  const payload = {
    event_type: "public_build_request",
    client_payload: {
      board: boardSelect.value,
      iface: ifaceSelect.value,
      clk: document.getElementById("clk").value,
      sleep: document.getElementById("sleep").value,
      sw0: document.getElementById("sw0").value,
      mag: document.getElementById("mag").value,
      pinmode: pinmodeSelect.value,
      wiring: wiringSelect.value,
      filename: document.getElementById("filename").value
    }
  };

  const res = await fetch("https://api.github.com/repos/NekodaKohaku/SlimeNRF-Firmware-CI/dispatches", {
    method: "POST",
    headers: { "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  status.textContent = res.ok ? "構建請求已送出，請稍後查看 Release 頁面。" : "提交失敗：" + res.statusText;
};
</script>
</body>
</html>
