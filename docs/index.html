<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>SlimeNRF Firmware Builder</title>
  <script src="lang.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    label { display: block; margin-top: 10px; }
    select, input, button { width: 100%; padding: 8px; margin-top: 5px; }
  </style>
</head>
<body>
  <h1 id="title"></h1>

  <label id="lbl-board"></label>
  <input id="board" placeholder="xiao_ble/nrf52840">

  <label id="lbl-filename"></label>
  <input id="filename" placeholder="SlimeNRF_Tracker_XIAO">

  <label id="lbl-clk"></label>
  <select id="clk">
    <option value="enabled">enabled</option>
    <option value="disabled">disabled</option>
  </select>

  <label id="lbl-sleep"></label>
  <select id="sleep">
    <option value="enabled">enabled</option>
    <option value="disabled">disabled</option>
  </select>

  <button id="btn-build"></button>
  <p id="status"></p>

  <script>
  const api = "https://api.github.com/repos/NekodaKohaku/SlimeNRF-Firmware-CI/actions/workflows/proxy_dispatch.yml/dispatches";

  function triggerBuild() {
    const board = document.getElementById("board").value;
    const filename = document.getElementById("filename").value;
    const clk = document.getElementById("clk").value;
    const sleep = document.getElementById("sleep").value;
    const status = document.getElementById("status");
    status.textContent = t("building");

    fetch(api, {
      method: "POST",
      headers: { "Accept": "application/vnd.github+json" },
      body: JSON.stringify({ ref: "main", inputs: { board, filename, clk, sleep } })
    })
    .then(r => r.ok ? status.textContent = t("success")
                    : status.textContent = t("failed") + " " + r.statusText);
  }

  const userLang = navigator.language.startsWith("ja") ? "ja" :
                   navigator.language.startsWith("zh") ? "zh" : "en";
  setLanguage(userLang);
  document.getElementById("btn-build").onclick = triggerBuild;
  </script>
</body>
</html>
